<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STC Associate 過去問クイズ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* グラデーション背景を html に固定 → スクロール量に関係なく全面に広がる */
html {
  min-height: 100%;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  background-attachment: fixed;
}
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  color: #e2e8f0;
  min-height: 100%;
  background: transparent;
}

/* ────────────────────────────────
   START SCREEN（PC・モバイル共通）
──────────────────────────────── */
#start-screen {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 24px 40px;
  text-align: center;
}
.game-title {
  font-size: 1.7rem;
  font-weight: 900;
  letter-spacing: 0.04em;
  background: linear-gradient(90deg, #63b3ed, #b794f4, #f6ad55);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.game-sub { font-size: 0.8rem; color: #718096; letter-spacing: 0.1em; margin-bottom: 40px; }
.start-icon { font-size: 3.5rem; margin-bottom: 16px; }
.start-meta { font-size: 0.9rem; color: #a0aec0; margin-bottom: 36px; }
.start-meta strong { color: #63b3ed; }
.start-btn {
  padding: 16px 60px;
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(102,126,234,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(102,126,234,0.5); }

/* ────────────────────────────────
   QUIZ SCREEN — PC デフォルト
──────────────────────────────── */
#quiz-screen {
  display: none;
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 24px 36px;
}
#quiz-screen.active { display: block; }

.quiz-title-bar {
  text-align: center;
  margin-bottom: 12px;
}
.quiz-title-text {
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.18em;
  background: linear-gradient(90deg, #63b3ed, #b794f4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.prog-wrap { margin-bottom: 10px; }
.prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.prog-label { font-size: 0.7rem; color: #718096; letter-spacing: 0.08em; }
.prog-num { font-size: 0.9rem; font-weight: 700; color: #63b3ed; }
.prog-track { background: rgba(255,255,255,0.1); border-radius: 99px; height: 6px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, #667eea, #63b3ed); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

.q-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(8px);
}
.q-source { font-size: 0.7rem; color: #b794f4; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 10px; }
.q-text { font-size: 1rem; line-height: 1.9; color: #e2e8f0; }

.btn-row { display: flex; gap: 14px; margin-bottom: 14px; }
.ans-btn {
  flex: 1;
  padding: 16px 0;
  font-size: 1.9rem;
  font-weight: 900;
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  transition: transform 0.1s, background 0.12s, box-shadow 0.12s;
}
.ans-btn:active { transform: scale(0.96); }
.btn-maru { background: rgba(49,130,206,0.15); color: #63b3ed; border-color: rgba(99,179,237,0.4); }
.btn-maru:hover { background: rgba(49,130,206,0.28); box-shadow: 0 4px 20px rgba(49,130,206,0.3); }
.btn-batsu { background: rgba(229,62,62,0.15); color: #fc8181; border-color: rgba(252,129,129,0.4); }
.btn-batsu:hover { background: rgba(229,62,62,0.28); box-shadow: 0 4px 20px rgba(229,62,62,0.3); }
.btn-maru.selected { background: #3182ce; color: white; border-color: #3182ce; box-shadow: 0 4px 20px rgba(49,130,206,0.45); }
.btn-batsu.selected { background: #e53e3e; color: white; border-color: #e53e3e; box-shadow: 0 4px 20px rgba(229,62,62,0.45); }
.ans-btn:disabled { opacity: 0.55; cursor: default; }

/* PC フィードバック：ボタンの下にフェードイン（ボタンは動かない） */
#result-area { display: none; }
#result-area.show { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.feedback-correct {
  background: rgba(72,187,120,0.1);
  border: 1.5px solid rgba(72,187,120,0.45);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 12px;
}
.feedback-wrong {
  background: rgba(245,101,101,0.1);
  border: 1.5px solid rgba(245,101,101,0.45);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 12px;
}
.feedback-label { font-size: 0.95rem; font-weight: 700; margin-bottom: 7px; }
.lbl-correct { color: #68d391; }
.lbl-wrong { color: #fc8181; }
.feedback-ans-row { font-size: 0.82rem; color: #718096; margin-bottom: 7px; }
.feedback-ans-row span { font-weight: 700; color: #a0aec0; }
.feedback-exp { font-size: 0.86rem; line-height: 1.75; color: #a0aec0; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 7px; }
.next-btn {
  width: 100%;
  padding: 14px;
  font-size: 0.95rem;
  font-weight: 700;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 0.06em;
  box-shadow: 0 4px 20px rgba(102,126,234,0.35);
  transition: opacity 0.2s;
}
.next-btn:hover { opacity: 0.88; }

/* ────────────────────────────────
   QUIZ SCREEN — モバイル上書き
   ボタンは固定位置、フィードバックは
   下からスライドするシート
──────────────────────────────── */
@media (max-width: 639px) {
  #quiz-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    padding:
      calc(env(safe-area-inset-top, 0px) + 8px)
      14px
      0;
    max-width: none;
    margin: 0;
  }
  .quiz-title-bar { margin-bottom: 6px; }
  .quiz-title-text { font-size: 0.72rem; }
  #quiz-screen.active { display: flex; }

  .prog-wrap { flex-shrink: 0; margin-bottom: 10px; }
  .q-card {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 10px;
  }
  .btn-row { flex-shrink: 0; margin-bottom: 0; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px); }

  /* モバイルフィードバック：position:fixed の下からスライドシート */
  /* PCの display:none/.show は上書きして常時 block（transform で制御） */
  #result-area {
    display: block !important;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(18, 14, 50, 0.97);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
    max-height: 56vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateY(105%);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 200;
    animation: none !important;
  }
  #result-area.show { transform: translateY(0); }
  .feedback-correct, .feedback-wrong { margin-bottom: 14px; }
}

/* ────────────────────────────────
   FINAL SCREEN
──────────────────────────────── */
#final-screen { display: none; }
#final-screen.show { display: block; }

.final-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.score-panel {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 30px 24px 24px;
  text-align: center;
  margin-bottom: 16px;
  backdrop-filter: blur(8px);
}
.score-lbl { font-size: 0.72rem; color: #718096; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.score-big { font-size: 5rem; font-weight: 900; background: linear-gradient(90deg, #63b3ed, #b794f4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
.score-denom { font-size: 1rem; color: #718096; margin: 4px 0 18px; }
.score-track { background: rgba(255,255,255,0.1); border-radius: 99px; height: 10px; overflow: hidden; margin-bottom: 8px; }
.score-fill { height: 100%; background: linear-gradient(90deg, #48bb78, #38a169); border-radius: 99px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }
.score-pct { font-size: 1.3rem; font-weight: 900; color: #68d391; }

.action-btns { margin-bottom: 16px; }
.restart-btn {
  width: 100%;
  padding: 14px;
  font-size: 0.95rem;
  font-weight: 700;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  letter-spacing: 0.05em;
  box-shadow: 0 4px 20px rgba(102,126,234,0.3);
  transition: opacity 0.2s;
}
.restart-btn:hover { opacity: 0.88; }

.result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.result-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 14px 16px;
  border-left: 4px solid transparent;
}
.result-item.correct { border-left-color: #48bb78; }
.result-item.wrong { border-left-color: #fc8181; }
.result-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; gap: 8px; }
.result-source { font-size: 0.68rem; color: #b794f4; font-weight: 700; letter-spacing: 0.06em; flex-shrink: 0; }
.result-badge-correct { background: rgba(72,187,120,0.2); color: #68d391; border-radius: 99px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
.result-badge-wrong { background: rgba(252,129,129,0.2); color: #fc8181; border-radius: 99px; padding: 2px 10px; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
.result-q { font-size: 0.86rem; color: #cbd5e0; line-height: 1.7; margin-bottom: 8px; }
.result-ans-row { font-size: 0.78rem; color: #718096; margin-bottom: 7px; }
.result-ans-row span { font-weight: 700; color: #a0aec0; }
.result-exp { font-size: 0.8rem; color: #718096; line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 8px; }
</style>
</head>
<body>

<!-- START -->
<div id="start-screen">
  <div class="start-icon">📋</div>
  <div class="game-title">STC ASSOCIATE</div>
  <div class="game-sub">過去問クイズ ／ 第53回〜第68回</div>
  <div class="start-meta"><strong>25問</strong> ランダム出題</div>
  <button class="start-btn" id="start-btn">START</button>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-title-bar">
    <span class="quiz-title-text">STC ASSOCIATE</span>
  </div>
  <div class="prog-wrap">
    <div class="prog-top">
      <span class="prog-label">QUESTION</span>
      <span class="prog-num" id="prog-text"></span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-bar"></div></div>
  </div>
  <div class="q-card">
    <div class="q-source" id="q-source"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="btn-row">
    <button class="ans-btn btn-maru" id="btn-maru">〇</button>
    <button class="ans-btn btn-batsu" id="btn-batsu">×</button>
  </div>
  <!-- PC: ボタン直下にフェードイン / モバイル: 固定下シート -->
  <div id="result-area">
    <div id="result-box"></div>
    <button class="next-btn" id="next-btn">次の問題へ →</button>
  </div>
</div>

<!-- FINAL -->
<div id="final-screen">
  <div class="final-inner">
    <div class="score-panel">
      <div class="score-lbl">FINAL SCORE</div>
      <div class="score-big" id="final-score"></div>
      <div class="score-denom">/ 25問</div>
      <div class="score-track"><div class="score-fill" id="score-bar" style="width:0%"></div></div>
      <div class="score-pct" id="score-pct"></div>
    </div>
    <div class="action-btns">
      <button class="restart-btn" id="restart-btn-top">🔄 もう一度挑戦する</button>
    </div>
    <div class="result-list" id="result-list"></div>
    <div class="action-btns">
      <button class="restart-btn" id="restart-btn">🔄 もう一度挑戦する</button>
    </div>
  </div>
</div>

<script>
var ALL_QUESTIONS = [{"id": "第53回 問1", "q": "国際輸出管理レジームは、法的拘束力を有する条約ではなく、参加国による紳士的な申合せである。", "ans": "〇", "exp": "正しい。国際輸出管理レジームは参加国の合意に基づく枠組みであり、条約のような法的拘束力を持たない。"}, {"id": "第53回 問2", "q": "輸出令別表第1の2の項で規制されている貨物について、英文を参照する場合は、オーストラリア・グループのサイトが参考になる。", "ans": "×", "exp": "誤り。2の項（原子力関連）は原子力供給国グループ（NSG）の規制であり、オーストラリア・グループ（AG）は3の2項（生物・化学）に対応する。"}, {"id": "第53回 問3", "q": "外為法第48条第1項の「輸出をしようとする者」は、個人のみであって、法人は含まれない。", "ans": "×", "exp": "誤り。「輸出をしようとする者」には、自然人（個人）だけでなく法人も含まれる。"}, {"id": "第53回 問4", "q": "「輸出貿易管理令別表第1及び外国為替令別表の規定に基づき貨物又は技術を定める省令」(貨物等省令)は、経済産業省令である。", "ans": "〇", "exp": "正しい。貨物等省令は経済産業省令として制定されている。"}, {"id": "第53回 問5", "q": "外為法第48条第1項中の「政令」とは、いずれも輸出貿易管理令のことである。", "ans": "〇", "exp": "正しい。貨物の輸出許可を定める政令は輸出令である。"}, {"id": "第53回 問6", "q": "輸出許可申請書に記載の経由地とは、貨物が仕向地に至るまでに積み替え、又は陸揚げされる場所をいう。", "ans": "〇", "exp": "正しい。運用通達等における「経由地」の定義に合致する。"}, {"id": "第53回 問7", "q": "本邦にあるメーカーXは、来週、特許庁の公開特許情報を米国にある子会社Yに提供する予定である。当該公開特許情報にリスト規制該当技術が含まれていたとしても、メーカーXは、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。公知の技術（公開特許情報等）の提供は、役務通達の規定により許可を要しない。"}, {"id": "第53回 問8", "q": "本邦にあるX大学では、米国にあるメーカーYから輸出令別表第1の2の項に該当するロボット(1台)を試用で借りたが、性能が良くなかったので、来週、返却する予定である。この場合、無償告示が適用できるので、X大学は輸出許可不要である。", "ans": "×", "exp": "誤り。輸出令別表第1の2の項（原子力関連）は、無償告示の適用対象から除外されている。"}, {"id": "第53回 問9", "q": "本邦にあるメーカーXは、来月、米国で行われる展示会に輸出令別表第1の3の項(2) 2に該当する貯蔵容器(1セット)を出品し、展示会終了後、本邦に持ち帰る予定である。この場合、メーカーXは、米国に輸出する際、輸出許可は不要である。", "ans": "×", "exp": "誤り。3の項該当貨物（化学武器関連）を国外へ送出する場合、一時的な展示目的であっても輸出許可が必要である。"}, {"id": "第53回 問10", "q": "貨物の該非判定は、①輸出令別表第1、②貨物等省令、③運用通達の用語の解釈を確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。これら3つのリソースを相互参照することが該非判定の実務要件である。"}, {"id": "第53回 問11", "q": "来日して1ヶ月のタイ人の大学院留学生Xは、非居住者として取り扱われるが、来日して7ヶ月のタイ人の大学院留学生Yは、居住者として取り扱われる。", "ans": "〇", "exp": "正しい。入国後6ヶ月を経過した者は原則として「居住者」と判定される（6ヶ月ルール）。"}, {"id": "第53回 問12", "q": "外為令別表の規定でよく使われる「係る技術」とは、「規制の性能レベル、特性若しくは機能に到達し又はこれらを超えるために必要な技術」をいう。", "ans": "×", "exp": "誤り。「係る技術」は関係する技術を広く指し、特定の仕様達成に不可欠な「必要な技術」よりも範囲が広い。"}, {"id": "第53回 問13", "q": "本邦にある貿易会社Xは、韓国にある防衛関連メーカーYから輸出令別表第1の16の項に該当する特殊合金1トンの注文を受けた。用途を確認したところ通常兵器であるマシンガンの製造に使うと連絡を受けた。この場合、通常兵器キャッチオールの用途要件にあたるので、貿易会社Xは輸出許可申請が必要である。", "ans": "×", "exp": "誤り。韓国は「グループA（別表第3）」に該当するため、通常兵器キャッチオール規制の対象外である。"}, {"id": "第53回 問14", "q": "本邦にあるメーカーXは、ドイツにある子会社Yに輸出令別表第1の4の項(15)2に該当する人造黒鉛a (総価額50万円)を自動車部品製造用に輸出する予定である。この場合、少額特例は適用できないので、輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。4の項（ミサイル関連）該当貨物は、少額特例の適用対象外である。"}, {"id": "第53回 問15", "q": "安全保障は国民の生命や財産に関わることから、外為法第1条では、「必要最大限の管理又は調整」を行うと規定している。", "ans": "×", "exp": "誤り。外為法第1条は、対外取引に対し「必要最小限」の管理または調整を行うことを基本としている。"}, {"id": "第53回 問16", "q": "本邦にあるメーカーXは、特別一般包括輸出・役務(使用に係るプログラム) 取引許可が適用できる輸出令別表第1の6の項に該当するロボット(総価額500万円)を外国ユーザーリストに掲載されている中国のY大学に輸出する予定である。Y大学による当該ロボットの用途が不明で、取引上、不審な点があっても、直ちに特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用して、輸出することができる。", "ans": "×", "exp": "誤り。用途が不明で不審な点がある（客観要件の懸念）場合、包括許可は適用できず、個別許可の申請が必要となる。"}, {"id": "第53回 問17", "q": "本邦にあるメーカーXの甲技術部長は、外為令別表の7の項に該当する新製品の設計図面1枚を自己使用目的で出張先のロンドンに持ち出す予定である。この場合、自己使用目的で第三者に提供することはなくても、当該設計図面を外国に持ち出すことになるので、メーカーXは、役務取引許可が必要である。", "ans": "×", "exp": "誤り。自己使用目的の携帯であり、外国において非居住者に提供することを目的としない場合は、役務取引許可を要しない。"}, {"id": "第53回 問18", "q": "本邦にあるメーカーXは、ベトナム向けに特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用可能なリスト規制該当貨物を輸出するにあたり、通常兵器の製造に使用される疑いがあったので、経済産業省へ届け出た。その後、経済産業省から当該輸出について異議がない旨の連絡があった場合、メーカーXは、特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用して、当該貨物を輸出できる。", "ans": "〇", "exp": "正しい。包括許可の運用（インフォーム手続）において、経産省から異議なしの連絡があった場合は包括許可の適用が可能である。"}, {"id": "第53回 問19", "q": "経済産業大臣は、外為法第48条第1項に違反した者に対し、行政制裁を科すことができる。", "ans": "〇", "exp": "正しい。外為法第53条に基づき、無許可輸出等の違反に対して輸出禁止等の行政制裁を科すことができる。"}, {"id": "第53回 問20", "q": "本邦にある貿易会社Xは、英国にあるメーカーYに輸出令別表第1の3の2の項(2) 5に該当する凍結乾燥器1台を個別の輸出許可を取得して輸出した。ところが、輸送中に一部が破損したため、貿易会社Xは、メーカーYからクレームを受け、至急、本邦に当該凍結乾燥器を送り戻してもらい、同一の凍結乾燥器に交換した後、メーカーYに再輸出する予定である。この場合、無償告示の規定により、輸出許可は不要である。", "ans": "〇", "exp": "正しい。無償告示（輸出令4条1項2号ホ）に基づき、代替品を無償で輸出する場合は許可不要となる特例がある。"}, {"id": "第53回 問21", "q": "個別輸出許可の申請は、当該輸出に係る取引契約が成立する前でも可能である。", "ans": "×", "exp": "誤り。原則として個別許可申請には、確定した取引契約書またはそれに準ずる書類が必要である。"}, {"id": "第53回 問22", "q": "本邦にあるメーカーXは、来月から継続的に輸出令別表第1の6の項 (1)に該当する軸受(総価額150万円)を韓国にある工作機械メーカーYに輸出する予定である。この場合、メーカーXは、一般包括輸出・役務(使用に係るプログラム) 取引許可を取得するとよい。", "ans": "×", "exp": "誤り。韓国は「グループA」であるため、一般包括許可ではなく「特別一般包括許可」または「特定包括許可」の対象となる。"}, {"id": "第53回 問23", "q": "外為法等遵守事項では、子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うことが求められている。", "ans": "〇", "exp": "正しい。内部規程（CP）の届出事項において、関連会社等への適切な指導が規定されている。"}, {"id": "第53回 問24", "q": "国内販売であっても、国内の販売先が輸出することが明らかである場合は、適切な社内輸出管理を行うことが重要である。", "ans": "〇", "exp": "正しい。最終的な仕向地や用途を考慮した社内管理がリスク回避のために重要である。"}, {"id": "第53回 問25", "q": "本邦にある貿易会社Xは、欧米を中心に毎日輸出を行っているが、輸出している製品は、全て輸出令別表第1の16の項に該当する貨物なので、外為法第55条の10第1項の輸出等を「業として行う者」にはあたらない。", "ans": "×", "exp": "誤り。16項該当貨物であっても、反復継続して輸出を行うのであれば「業として行う者」に該当し、遵守基準の適用を受ける。"}, {"id": "第54回 問1", "q": "外為法第48条第1項では、「国際的な平和及び安全の維持を妨げることとなると認められるものとして政令で定める特定の地域を仕向地とする特定の種類の貨物の(A)は、政令で定めるところにより、経済産業大臣の許可を受けなければならない。」と規定されている。(A)には、「居住者」が入る。", "ans": "×", "exp": "誤り。(A)には「輸出をしようとする者」が入る。第48条第1項において申請主体は居住者に限られない。"}, {"id": "第54回 問2", "q": "本邦にある貿易会社Xは、輸出令別表第1の2の項に関連する貨物を中国のメーカーYから輸入し、米国などで販売する予定である。輸出令別表第1の2の項は、NSG(原子力供給国グループ)の規制であるから、同サイトにある英文の規制リストを参考に中国のメーカーYに該非を確認するとよい。", "ans": "〇", "exp": "正しい。2の項はNSGに基づいているため、当該レジームのリストは有効な参考資料となる。"}, {"id": "第54回 問3", "q": "外為令別表の1の項は、「輸出貿易管理令別表第1の1の項の中欄に掲げる貨物の設計、製造又は使用に係る技術」と規定されている。したがって、「輸出貿易管理令別表第1の1の項の中欄に掲げる貨物の設計、製造又は使用に係るプログラム」は外為令別表の1の項に該当しない。", "ans": "×", "exp": "誤り。外為法上、プログラムは「技術」に含まれるため、貨物の設計・製造・使用に係るプログラムも外為令別表に該当する。"}, {"id": "第54回 問4", "q": "本邦にあるメーカーXは、横須賀にある在日米軍基地に輸出令別表第1の7の項(1)に該当する集積回路(総価額200万円)を修理用の部品として納品する予定である。この場合、輸出にあたるので、輸出許可が必要である。", "ans": "×", "exp": "誤り。国内にある在日米軍基地への納品は「本邦からの送出（輸出）」に該当しないため、輸出許可は不要である。"}, {"id": "第54回 問5", "q": "本邦にある貿易会社Xは、レバノンにあるメーカーYから、輸出令別表第1の16の項に該当する無機繊維1トンの注文を受けた。用途を確認したところ、通常兵器であるマシンガンの製造に使うと電子メールで連絡を受けた。この場合、貿易会社Xは、通常兵器キャッチオール規制の用途要件を満たすので、輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。レバノンは「別表第3の2（国連武器禁輸地域）」に該当し、通常兵器用途が判明しているため許可が必要。"}, {"id": "第54回 問6", "q": "外国ユーザーリストは、大量破壊兵器キャッチオール規制の用途要件に関するリストである。", "ans": "×", "exp": "誤り。外国ユーザーリストは、用途要件ではなく「需要者要件」に関するリストである。"}, {"id": "第54回 問7", "q": "本邦にある貿易会社Xは、先月、ニューヨーク支店を開設した。当該ニューヨーク支店は、法人として「非居住者」にあたる。", "ans": "〇", "exp": "正しい。外国にある事務所（支店）は、本邦法人の拠点であっても法人として「非居住者」として扱われる。"}, {"id": "第54回 問8", "q": "本邦にあるメーカーXは、米国にある子会社に自転車部品製造のため、輸出令別表第1の15の項 (1)に該当する無機繊維(総価額4万円)を輸出する予定である。この場合、メーカーXは、少額特例が適用できるので、輸出許可は不要である。", "ans": "〇", "exp": "正しい。15項該当貨物で、総価額が5万円以下の輸出（グループA向け）は少額特例が適用される。"}, {"id": "第54回 問9", "q": "本邦にあるメーカーXは、来年から毎月、シンガポールにある子会社Y向けに輸出令別表第1の6の項(2)に該当する数値制御工作機械の輸出を予定している。この場合、一般包括輸出・役務(使用に係るプログラム) 取引許可を取得すると良い。", "ans": "×", "exp": "誤り。6の項(2)の工作機械は、一般包括許可の適用対象外（除外項目）である。"}, {"id": "第54回 問10", "q": "本邦にあるメーカーXは、輸出令別表第1の2の項 (12) に該当する測定装置1台を取得している特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用して、韓国にあるメーカーYに輸出した。この場合、メーカーXは、この輸出に関する資料を輸出時から少なくとも7年間保存しなければならない。", "ans": "〇", "exp": "正しい。包括許可の適用に関する書類は、内部規程（CP）等の要件により一定期間（通常5年〜7年）の保存が義務付けられる。"}, {"id": "第54回 問11", "q": "本邦にあるメーカーXは、米国にあるメーカーYから製造請負の引き合いを受け、外為令別表の2の項に該当する設計図面を入手した。自社で製造が可能か検討したが製造コストが見合わないため、断念することにした。メーカーXは、来週、国際郵便で設計図面をメーカーYに返却する予定であるが、この場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。リスト規制該当技術（2の項）を国外に返却する場合も、役務取引許可が必要である。"}, {"id": "第54回 問12", "q": "本邦にあるメーカーXは、6ヶ月前に米国にあるメーカーYから、輸出令別表第1の6の項 (7) に該当するロボット(総価額300万円)を輸入したが、故障したため、修理のためにメーカーYに送り返す予定である。この場合、メーカーXは、無償告示により輸出許可は不要である。", "ans": "×", "exp": "誤り。リスト規制品を修理のために返送する場合、特例（無償告示等）の適用条件を厳格に満たす必要があり、一律に不要とはならない。"}, {"id": "第54回 問13", "q": "外為法第55条の10第1項では、「全ての輸出者等は、輸出者等遵守基準を定めなければならない。」と規定している。", "ans": "×", "exp": "誤り。遵守基準は経済産業大臣が定めるものであり、輸出者等はそれを「遵守」する義務を負う。"}, {"id": "第54回 問14", "q": "ワッセナー・アレンジメント (WA)は、地域紛争防止の観点から、通常兵器の過度な蓄積の防止を目的としている。", "ans": "〇", "exp": "正しい。WAは通常兵器および関連汎用品の輸出管理を目的とする国際レジームである。"}, {"id": "第54回 問15", "q": "本邦にある貿易会社Xは、本邦にあるメーカーYより、製品 a を購入し、該非判定書を入手したところ、リスト規制非該当と記載があったので、そのまま該非判定書を再チェックすることなく、輸出した。輸出後、メーカーYから、製品 a は、輸出令別表第1の4の項に該当することが判明したと連絡があった。この場合、外為法違反に問われるのは、メーカーYであって、貿易会社Xではない。", "ans": "×", "exp": "誤り。輸出者（貿易会社X）は自己の責任で正しい該非判定を行う義務があり、メーカーの判定誤りがあっても輸出者が違反に問われる。"}, {"id": "第54回 問16", "q": "本邦にあるメーカーXが、輸出令別表第1の3の2の項 (2) 3に該当する遠心分離機1台をコロナウィルス研究に用いる米国の大学Y向けに輸出する場合、輸出許可は不要である。", "ans": "×", "exp": "誤り。3の2の項（生物・化学）該当貨物を輸出する場合、用途や仕向地に関わらず、原則として個別許可が必要である。"}, {"id": "第54回 問17", "q": "輸出許可の具体的な申請先や具体的に必要な書類は、役務通達で規定されている。", "ans": "×", "exp": "誤り。申請手続や書類は「輸出注意事項」や「提出書類通達」等に規定されている。役務通達は技術提供許可の基準を定めるものである。"}, {"id": "第54回 問18", "q": "タイからの留学生Xは、来日から5ヶ月を経過した。この場合、留学生Xは、非居住者として取り扱われる。", "ans": "〇", "exp": "正しい。入国後6ヶ月未満で事務所に勤務していない学生は「非居住者」である。"}, {"id": "第54回 問19", "q": "外為法等遵守事項では、子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うことが求められている。", "ans": "〇", "exp": "正しい。第53回問23と同様、適切な指導が求められている。"}, {"id": "第54回 問20", "q": "輸出許可申請書に記載の経由地とは、貨物が仕向地に至るまでに積み替え、又は陸揚げされる場所をいう。", "ans": "〇", "exp": "正しい。第53回問6と同様の定義である。"}, {"id": "第54回 問21", "q": "特別一般包括輸出・役務(使用に係るプログラム) 取引許可で輸出できる規制対象貨物は、輸出令別表第1の中欄に掲げられている全ての規制対象貨物である。", "ans": "×", "exp": "誤り。特別一般包括許可には、武器（1の項）や原子力（2の項の一部）など、適用除外となる貨物が存在する。"}, {"id": "第54回 問22", "q": "一般包括許可及び特別一般包括許可の申請先は、経済産業省の安全保障貿易審査課である。", "ans": "×", "exp": "誤り。包括許可の申請窓口は、主として各経済産業局等である。"}, {"id": "第54回 問23", "q": "本邦にある貿易会社Xは、タイにあるメーカーYから、輸出令別表第1の16の項に該当する炭素繊維を購入し、パキスタンにあるメーカーZに売却する予定である。当該炭素繊維は、タイのメーカーYからパキスタンのメーカーZへ直接輸出される。貿易会社Xは、メーカーZを調べたところ、外国ユーザーリスト掲載企業であることが判明したが、用途はエアコンの部品製造と確認できている。この場合、貿易会社Xは、外為法第25条第4項の仲介貿易取引許可の申請は不要である。", "ans": "〇", "exp": "正しい。16項該当貨物の仲介貿易において、懸念用途がない（民生用）場合は、パキスタン向けであっても許可不要である。"}, {"id": "第54回 問24", "q": "経済産業大臣は、外為法第53条第1項に基づき、外為法第48条第1項に違反した者に対し、行政制裁を科すことができる。", "ans": "〇", "exp": "正しい。無許可輸出等の違反に対する行政制裁権限である。"}, {"id": "第54回 問25", "q": "本邦にあるX大学の甲教授は、海外の学会で、外為令別表の9の項に該当する暗号通信技術について講演をする際、参加者が特定の大学の研究者に限定されていたとしても、役務取引許可は不要である。", "ans": "×", "exp": "誤り。特定の参加者に限定された（不特定多数に公開されていない）場でのリスト規制技術の提供は、役務取引許可が必要である。"}, {"id": "第55回 問1", "q": "技術の該非判定は、①外為令別表、②貨物等省令、③運用通達の用語の解釈を確認しながら行う必要がある。", "ans": "×", "exp": "誤り。技術の該非判定においては、運用通達（貨物用）ではなく「役務通達」の用語の解釈を参照すべきである。"}, {"id": "第55回 問2", "q": "本邦にある貿易会社Xは、オーストラリアにある防衛関連メーカーYから輸出令別表第1の16の項に該当するニッケル合金1トンの注文を受けた。用途を確認したところ通常兵器であるマシンガンの製造に使うと連絡を受けた。この場合、貿易会社Xは輸出許可申請不要である。", "ans": "〇", "exp": "正しい。オーストラリアは「グループA」であるため、通常兵器キャッチオール規制は適用されない。"}, {"id": "第55回 問3", "q": "MTCR関連の貨物と技術は、それぞれ輸出令別表第1の4の項と外為令別表の4の項で規制されている。", "ans": "〇", "exp": "正しい。4の項はミサイル技術管理レジーム（MTCR）の合意に基づく規制である。"}, {"id": "第55回 問4", "q": "中華人民共和国と大韓民国は、すべての国際輸出管理レジームに参加している。", "ans": "×", "exp": "誤り。中国は全てのレジーム（特にNSG等）に参加しているわけではない。"}, {"id": "第55回 問5", "q": "輸出令別表第1の5から15の項で規制されている貨物の英訳をする場合は、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。5〜15項はWAの規制に基づいている。"}, {"id": "第55回 問6", "q": "輸出令別表第1や貨物等省令で規定されている用語には、運用通達で、一般用語と異なった意味で定義されている場合があるので、該非判定では注意する必要がある。", "ans": "〇", "exp": "正しい。例えば「使用」や「製造」などは法令上の独自定義（解釈）がある。"}, {"id": "第55回 問7", "q": "運用通達によれば、輸出の時点とは、税関への輸出申告時をいう。", "ans": "×", "exp": "誤り。運用通達において、輸出の時点とは原則として貨物を積載した船または航空機が「離岸または離陸した時」を指す。"}, {"id": "第55回 問8", "q": "外為法第1条では、我が国又は国際社会の平和及び安全の維持のため、「必要最小限の管理又は調整」を行うと規定されている。", "ans": "〇", "exp": "正しい。自由な取引を前提としつつ、安全保障上「必要最小限」の管理を行う。"}, {"id": "第55回 問9", "q": "外為令別表の10の項の中欄に掲げる技術とは、外為令別表の10の項に該当する技術という意味である。", "ans": "〇", "exp": "正しい。別表の「中欄」は該当する項目を指す。"}, {"id": "第55回 問10", "q": "輸出令第5条第1項により、税関は、経済産業大臣の指示に従い、外国や非居住者に技術を提供しようとする居住者が役務取引許可を受けていること、若しくは役務取引許可を受けることを要しないことを確認しなければならないと規定している。", "ans": "×", "exp": "誤り。輸出令第5条第1項は「貨物の輸出」に係る確認規定であり、技術提供の確認は外為法および関連規定に基づく。"}, {"id": "第55回 問11", "q": "本邦にあるX大学では、輸出令別表第1の3の2の項 (2) 2に該当する発酵槽(総価額90万円)を来月、アメリカにあるY大学に輸出する予定である。当該発酵槽を基礎科学分野の研究活動に用いるのであれば、輸出許可は不要である。", "ans": "×", "exp": "誤り。「基礎科学分野の研究活動」の特例は技術提供（役務）のみに適用され、貨物（発酵槽）の輸出には適用されない。"}, {"id": "第55回 問12", "q": "役務通達では、「技術とは、(A)の設計、製造又は使用に必要な特定の情報をいう。」と規定されている。(A) には「貨物」が入る。", "ans": "〇", "exp": "正しい。役務通達における技術の定義に合致する。"}, {"id": "第55回 問13", "q": "本邦にあるメーカーXの甲研究員は、たまたまニューヨークに出張中の乙部長に、毎週行っている業務報告(外為令別表の5の項に該当する技術が含まれている。)を電子メールで送る場合、役務取引許可は不要である。なお、乙部長は、この業務報告を第三者に提供することはないものとする。", "ans": "×", "exp": "誤り。出張中の居住者であっても、外国（ニューヨーク）において技術を提供（受信）させる行為は、役務取引許可が必要である。"}, {"id": "第55回 問14", "q": "本邦にあるメーカーXは、自社のイントラネット(組織内におけるプライベートネットワークのこと)を来月から海外子会社に開放する予定である。イントラネット内には、自社で開発した外為令別表の9の項に該当する製造技術が多数存在しているが、イントラネット用のサーバー自体は、本邦内に設置されているので、メーカーXは、役務取引許可は不要である。", "ans": "×", "exp": "誤り。サーバーの場所に関わらず、本邦から外国へ技術を提供し受信させる行為は、役務取引許可の対象となる。"}, {"id": "第55回 問15", "q": "本邦にあるメーカーXは、日本で公開特許情報となった技術資料(外為令別表の7の項該当技術)のみをインドネシアにあるメーカーYに提供する予定である。この場合、メーカーXは、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。公知の技術の提供は許可不要である。"}, {"id": "第55回 問16", "q": "輸出令別表第1の16の項に該当する貨物は、輸出令別表第1の1から15の項に該当しない。", "ans": "〇", "exp": "正しい。16項（キャッチオール規制）は、1〜15項（リスト規制）に含まれないものを補完的に規制する。"}, {"id": "第55回 問17", "q": "リスト規制における規制対象地域は、輸出令別表第3の地域を除く全地域であるが、キャッチオール規制における規制対象地域は、全地域である。", "ans": "×", "exp": "誤り。リスト規制は全地域対象であり、キャッチオール規制はグループA（別表第3）を除く地域が対象である。"}, {"id": "第55回 問18", "q": "キャッチオール規制で、経済産業大臣からインフォームを受けた場合でも、相手先の用途が民生用途と連絡を受けている場合は、輸出許可申請は不要である。", "ans": "×", "exp": "誤り。経産大臣からのインフォーム通知を受けた場合は、輸出者の判断に関わらず許可申請が必要となる。"}, {"id": "第55回 問19", "q": "キャッチオール規制の客観要件は、輸出者が通常の商慣習の範囲内で入手した文書等や輸入者等から連絡を受けた情報で判断をすれば良い。", "ans": "〇", "exp": "正しい。客観要件の確認基準に合致する。"}, {"id": "第55回 問20", "q": "本邦にあるメーカーXが、輸出令別表第1の16の項に該当する炭素繊維を台湾のメーカーYに輸出する際、用途は航続距離300キロメートル以上の無人航空機の製造に使用すると連絡を受けた。この場合、メーカーXは、大量破壊兵器キャッチオール規制に基づく輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。300km以上の無人航空機は「ミサイル（大量破壊兵器）」関連の用途要件に該当する。"}, {"id": "第55回 問21", "q": "貨物の仲介貿易取引許可は、外為法第25条第4項で規定されている。", "ans": "〇", "exp": "正しい。仲介貿易取引の許可規定である。"}, {"id": "第55回 問22", "q": "本邦にある貿易会社Xは、1つの契約で輸出令別表第1の7の項 (1)に該当する集積回路(総価額3,000万円)を台湾のスマートフォンメーカーに輸出することになった。製造の関係で、今後、1月、3月、5月と3回に分けて輸出する予定であるが、この場合、貿易会社Xは、輸出許可を1度取得すればよい。", "ans": "〇", "exp": "正しい。1つの許可証の範囲内であれば、複数回に分けて輸出（分積）することが可能である。"}, {"id": "第55回 問23", "q": "特別一般包括許可の対象地域は、輸出令別表第3の地域(グループA) に限定されている。", "ans": "×", "exp": "誤り。特別一般包括許可は、グループA以外の一定の地域に対しても適用可能な場合がある。"}, {"id": "第55回 問24", "q": "他社製品を輸出する際、該非判定の責任は一義的に輸出者にあるので、自社で確実な該非判定が行えなければ、メーカーの判定書を入手し、再度、輸出者自身がチェックすることが重要である。", "ans": "〇", "exp": "正しい。輸出者の自己責任原則に基づく適切な対応である。"}, {"id": "第55回 問25", "q": "本邦にある貿易会社Xは、欧米を中心に毎日輸出を行っているが、扱っている製品は、全て輸出令別表第1の16の項に該当する貨物なので、外為法第55条の10第1項の輸出等を「業として行う者」にはあたらない。", "ans": "×", "exp": "誤り。第53回問25と同様、反復継続する以上「業として行う者」に該当する。"}, {"id": "第56回 問1", "q": "NSG(原子力供給国グループ)で規制される貨物・技術は、輸出令別表第1の4の項と外為令別表の4の項で規制されている。", "ans": "×", "exp": "誤り。原子力関連（NSG）は「2の項」であり、4の項はMTCR（ミサイル）である。"}, {"id": "第56回 問2", "q": "輸出令別表第1の5の項の中欄には、「次に掲げる貨物であつて、経済産業省令で定める仕様のもの」と規定されているが、この経済産業省令とは、「輸出貿易管理令別表第1及び外国為替令別表の規定に基づき貨物又は技術を定める省令」(貨物等省令)のことである。", "ans": "〇", "exp": "正しい。リスト規制の具体的仕様を定めるのは貨物等省令である。"}, {"id": "第56回 問3", "q": "本邦にあるメーカーXは、米国にある100%子会社Yに自社のA技術課長を2ヶ月間派遣し、外為令別表の2の項に該当する技術指導を行う予定である。メーカーXは、100%子会社Yに当該技術を提供するのであるから、役務取引許可は不要である。", "ans": "×", "exp": "誤り。親子会社間であっても、国外（米国）においてリスト規制技術を提供する場合は、役務取引許可が必要である。"}, {"id": "第56回 問4", "q": "外為法第25条第1項では、「国際的な平和及び安全の維持を妨げることとなると認められるものとして政令で定める特定の種類の貨物の設計、製造若しくは使用に係る技術(以下「特定技術」という。)を特定の外国(以下「特定国」という。)において提供することを目的とする取引を行おうとする居住者若しくは非居住者又は特定技術を特定国の非居住者に提供することを目的とする取引を行おうとする(A)は、政令で定めるところにより、当該取引について、経済産業大臣の許可を受けなければならない。」と規定している。(A)には、「居住者」が入る。", "ans": "〇", "exp": "正しい。非居住者への技術提供許可を申請すべき国内の主体は「居住者」である。"}, {"id": "第56回 問5", "q": "輸出令別表第1の3の2の項で規制されている貨物の英訳をする場合は、オーストラリア・グループ (AG)のサイトが参考になる。", "ans": "〇", "exp": "正しい。3の2項（生物・化学）はAGの規制に基づいている。"}, {"id": "第56回 問6", "q": "本邦にある貿易会社Xは、中国にあるメーカーYから輸出令別表第1の16の項に該当するチタン合金の注文を受けた。メーカーYとは初めての取引だったので、同社のホームページを確認したところ、20年前に大陸間弾道ミサイルの製造に関与していたとする記事を発見した。この場合、大量破壊兵器キャッチオール規制の用途要件に該当するので、貿易会社Xは、直ちに輸出許可申請が必要である。", "ans": "×", "exp": "誤り。20年前の活動は直ちに現在の用途要件には該当しない。通常の商慣習等に照らした現在の懸念確認が必要である。"}, {"id": "第56回 問7", "q": "本邦にあるX大学は、米国にあるY大学との共同研究の契約に基づき、X大学が所有する測定装置をY大学に国際便で送付した。測定装置は、輸出令別表第1の2の項(12) 2に該当する貨物であったが、X大学の担当者は、外為法の規制を知らなかったので、無許可で輸出した。この場合、X大学は、外為法違反には問われない。", "ans": "×", "exp": "誤り。法令の不知（知らなかったこと）は違反を免れる理由にならず、無許可輸出として外為法違反に問われる。"}, {"id": "第56回 問8", "q": "本邦にあるメーカーXは、輸出令別表第1の3の2の項 (2) 3に該当する遠心分離機1セット(総価額50万円)をドイツにある製薬メーカーYに輸出する予定である。この場合、少額特例が適用できるので、輸出許可不要である。", "ans": "×", "exp": "誤り。3の2項該当貨物は少額特例の適用対象外である。"}, {"id": "第56回 問9", "q": "本邦にあるメーカーXは、5年前に輸出許可を取得して韓国にあるメーカーYに輸出した焼却装置a(輸出令別表第1の3の項(2)10に該当)が故障したので、韓国から日本に修理のために輸入し、故障した箇所を修理後、メーカーYに輸出する予定である。この場合、修理費用として70万円かかったので、無償告示は適用できない。したがって、メーカーXは、輸出許可申請が必要である。", "ans": "×", "exp": "誤り。無償告示（修理のための無償輸入後の再輸出）において、修理費用の多寡は直接の制限理由にならない。"}, {"id": "第56回 問10", "q": "本邦にあるメーカーXは、フランスにある子会社Yに、取得している特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用して、輸出令別表第1の3の項(2) 2に該当する貯蔵容器3セットを輸出した。この場合、輸出関連書類等は、輸出時から7年間保存する必要がある。下線部分は正しい。", "ans": "〇", "exp": "正しい。包括許可の適用に関する書類はCP等により7年間の保存が求められることがある。"}, {"id": "第56回 問11", "q": "本邦にあるX大学が、特別一般包括輸出・役務(使用に係るプログラム) 取引許可を使用して、同許可の適用可能な貨物を韓国にあるY大学に輸出する。Y大学の用途は、通常兵器の製造である場合、当該特別一般包括輸出・役務(使用に係るプログラム) 取引許可は失効する。", "ans": "〇", "exp": "正しい。通常兵器用途が判明した場合（一部地域除く）、包括許可の適用は失効・制限される。"}, {"id": "第56回 問12", "q": "本邦にあるメーカーXは、自社で開発した外為令別表の9の項(1)に該当する暗号技術 a を韓国にあるメーカーYに口頭で説明する場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。口頭であってもリスト規制技術を提供（説明）する行為は、役務取引許可が必要である。"}, {"id": "第56回 問13", "q": "大量破壊兵器キャッチオール規制は、ワッセナー・アレンジメントの合意に基づいて実施されている。", "ans": "×", "exp": "誤り。ワッセナー・アレンジメント（WA）は「通常兵器・汎用品」の管理を目的としており、大量破壊兵器関連は他のレジームが対応する。"}, {"id": "第56回 問14", "q": "外為法第55条の10第1項の「輸出者等遵守基準」とは、「外為法等遵守事項」のことである。", "ans": "×", "exp": "誤り。「輸出者等遵守基準」は遵守基準省令に基づく法的要件であり、「外為法等遵守事項」は事務的な呼称である。"}, {"id": "第56回 問15", "q": "外為令別表やこれに基づく貨物等省令で規定されている用語には、役務通達の用語の解釈で、一般用語と異なった意味で定義されている場合があるので、該非判定では留意する必要がある。", "ans": "〇", "exp": "正しい。実務上の重要事項である。"}, {"id": "第56回 問16", "q": "輸出令第5条第1項は、「税関は、(A)の指示に従い、貨物を輸出しようとする者が法第48条第1項の規定による許可若しくは第2条第1項の規定による承認を受けていること又は当該許可若しくは承認を受けることを要しないことを確認しなければならない。」と規定している。(A)には、「財務大臣」が入る。", "ans": "×", "exp": "誤り。(A)には「経済産業大臣」が入る。"}, {"id": "第56回 問17", "q": "「輸出令別表第1の1の項の中欄に掲げる貨物」とは、輸出令別表第1の1の項に該当する貨物という意味である。", "ans": "〇", "exp": "正しい。用語の定義通りである。"}, {"id": "第56回 問18", "q": "本邦にあるメーカーXは、フィリピンにあるメーカーYから、輸出令別表第1の16の項に該当するアルミニウム合金20トン分の注文を受けた。用途を確認したところ、通常兵器である短距離ミサイルの部品製造に使うとメールで連絡を受けた。この場合、通常兵器キャッチオール規制の用途要件を満たすので、メーカーXは輸出許可申請が必要である。", "ans": "×", "exp": "誤り。フィリピンは「別表第3の2（国連武器禁輸地域）」に含まれないため、通常兵器用途であっても許可申請は不要である。"}, {"id": "第56回 問19", "q": "本邦にある貿易会社Xは、中国にある外国ユーザーリストに掲載されている研究機関Y(懸念区分は、ミサイル)から、輸出令別表第1の16の項に該当する炭素繊維(懸念用途は、核兵器、ミサイル) 2トンの注文を受けた。炭素繊維は、2トンと量も多く用途を確認したところ、用途が不明で不自然な回答しか得られなかった。貿易会社Xが、当該炭素繊維を輸出する場合、大量破壊兵器キャッチオール規制に基づく輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。需要者に懸念があり、かつ用途が不明で不自然な回答がある場合は許可申請が必要である。"}, {"id": "第56回 問20", "q": "運用通達では、許可申請時に必要な契約書には、「原則として、政府の許可が得られるまで契約が発効しない旨の規定を盛り込んだものであること。」が求められている。", "ans": "〇", "exp": "正しい。トラブル防止のための標準的な手続要件である。"}, {"id": "第56回 問21", "q": "初来日から7ヶ月経ったベトナム人の留学生Xは、数学の能力が優れていることから、ベトナム政府から留学費用の全額の支給を受けている。この場合、留学生Xは、特定類型②該当する。", "ans": "〇", "exp": "正しい。外国政府等から多額の金銭を得ている居住者は特定類型②に該当する。"}, {"id": "第56回 問22", "q": "本邦にあるメーカーXが、新製品開発のため、特定類型①に該当する社員Aに外為令別表の9の項 (1)に該当する暗号通信の製造技術を提供する場合、役務取引許可が必要である。", "ans": "〇", "exp": "正しい。特定類型該当者（①〜③）へのリスト規制技術の提供は、国内であっても許可が必要である。"}, {"id": "第56回 問23", "q": "外為法等遵守事項では、関係法令に違反したとき又は違反したおそれがあるときは、速やかに輸出管理部門に報告することが求められている。", "ans": "×", "exp": "誤り。遵守事項においては「関係法令に違反したことが判明したとき」の報告が規定されており、「おそれがあるとき」までの報告は一律には求められていない。"}, {"id": "第56回 問24", "q": "本邦にあるメーカーXは、来月、輸出令別表第1の2の項 (17) 1に該当するアルミニウム合金を米国にある航空機メーカーYに無償サンプルとして輸出しようとしている。この場合、無償なのでメーカーXは、輸出許可申請不要である。", "ans": "×", "exp": "誤り。リスト規制品（2の項）は無償サンプルであっても、仕向地を問わず輸出許可が必要である。"}, {"id": "第56回 問25", "q": "輸出許可申請時には、輸出に至った経緯がわかる契約書や注文書等が必要である。", "ans": "〇", "exp": "正しい。申請時の必須書類である。"}, {"id": "第57回 問1", "q": "輸出令別表第1の5から15の項で規制されている貨物の英訳をする場合は、ワッセナー・アレンジメント (WA) のサイトが参考になる。", "ans": "〇", "exp": "正しい。5〜15項はWAの規制項目に基づいている。"}, {"id": "第57回 問2", "q": "本邦にあるメーカーXは、韓国の警察から、特別一般包括役務取引許可が適用できる外為令別表の9の項 (1) に該当する暗号プログラムが含まれた会計ソフトを受注した。用途は、会計事務に用いられるものであることが判明しているが、この場合、メーカーXは、当該取引に先立ち経済産業大臣への「届出」が必要である。", "ans": "×", "exp": "誤り。韓国は「グループA」であるため、特定用途確認に伴う事前の届出は不要である。"}, {"id": "第57回 問3", "q": "本邦にある貿易会社Xは、インドにあるメーカーYから、輸出令別表第1の16の項に該当するチタン1トンの注文を受けた。用途を確認したところ、通常兵器である戦車の製造に使用すると電子メールで連絡を受けた。この場合、通常兵器キャッチオール規制の用途要件を満たすので、貿易会社Xは、輸出許可申請が必要である。", "ans": "×", "exp": "誤り。インドは「別表第3の2（国連武器禁輸地域）」に含まれないため、通常兵器用途であっても許可申請は不要である。"}, {"id": "第57回 問4", "q": "本邦にあるメーカーXは、来月、輸出令別表第1の3の2の項 (2) 3に該当する遠心分離機a (50セット)を米国にあるY大学に輸出する予定である。遠心分離機と同じ性能の遠心分離機が、米国国内でも販売されているのを確認できれば、メーカーXは、輸出許可申請不要である。", "ans": "×", "exp": "誤り。リスト規制品は他国での市販状況に関わらず、仕様を満たせば輸出許可が必要である。"}, {"id": "第57回 問5", "q": "本邦にあるX大学では、台湾にあるメーカーYから外為令別表の9の項に該当する暗号通信プログラムa (1セット)が入ったCDを試用で借りたが、性能が良くなかったので、来週、当該CDをメーカーYに返却する予定である。この場合、X大学は役務取引許可申請が必要である。", "ans": "〇", "exp": "正しい。リスト規制技術を国外（台湾）に提供（返却）する行為は、許可が必要である。"}, {"id": "第57回 問6", "q": "貨物の該非判定は、①輸出令別表第1、②貨物等省令、③運用通達の用語の解釈を確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。第53回問10と同様である。"}, {"id": "第57回 問7", "q": "本邦にあるメーカーXは、最先端のAIのベンチャー企業で、運営資金の25%以上を米国政府から資金提供を受けている。したがって、メーカーXは特定類型②に該当する。", "ans": "×", "exp": "誤り。特定類型の規定は「居住者である自然人」を対象としており、法人であるメーカーXには適用されない。"}, {"id": "第57回 問8", "q": "外為令別表で規定されている「使用」には、「修理」も含まれる。", "ans": "〇", "exp": "正しい。役務通達等の定義において「使用」には修理が含まれる。"}, {"id": "第57回 問9", "q": "輸出許可の申請者は、貨物の輸出を行おうとする者本人が原則であり、居住者であるか非居住者であるかを問わない。", "ans": "〇", "exp": "正しい。申請主体は輸出を行おうとする者本人である。"}, {"id": "第57回 問10", "q": "技術とは、(A)の設計、製造又は使用に必要な特定の情報をいう。(A)には、「貨物」が入る。", "ans": "〇", "exp": "正しい。役務通達における技術の定義である。"}, {"id": "第57回 問11", "q": "来日したばかりの米国のソフトメーカーXのA部長は、滞在先の都内のホテルから来週訪問する予定の中国にあるメーカーYのB部長宛に、外為令別表の7の項に該当する技術資料を事前に電子メールで送付する予定である。この場合、ソフトメーカーXのA部長は、役務取引許可申請が必要である。", "ans": "〇", "exp": "正しい。非居住者であっても、日本国内から国外（中国）へリスト規制技術を送信する行為は、許可が必要である。"}, {"id": "第57回 問12", "q": "本邦にある貿易会社Xは、英国にある日系のメーカーYから、自動運転の部品の開発に使用するため、輸出令別表第1の15の項 (2) に該当する電波吸収材(総価額3万円)の注文を受けた。貿易会社Xが、当該電波吸収材をメーカーYに輸出する場合、少額特例は適用できない。", "ans": "×", "exp": "誤り。15項該当貨物で、総価額5万円以下の英国（グループA）向け輸出は、少額特例が適用できる。"}, {"id": "第57回 問13", "q": "本邦にあるメーカーXが、外為令別表の1から15の項に該当する技術を口頭で非居住者に提供する場合は、役務取引許可は必要であるが、外為令別表の16の項に該当する技術を口頭で非居住者に提供する場合は、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。1〜15項技術は提供手段を問わず許可が必要だが、16項技術の提供は原則として自由である。"}, {"id": "第57回 問14", "q": "月刊の技術雑誌に最先端のAI技術に関する論文a (外為令別表の9の項に該当する技術が含まれている。)が掲載された。本邦にあるメーカーXのA社長は、論文を読んで、感銘を受けたので、近くの書店で購入し、メーカーXの海外関連会社にこの論文 a が掲載されている技術雑誌を郵送する予定である。この場合、メーカーXは役務取引許可を取得する必要はない。", "ans": "〇", "exp": "正しい。すでに市販されている公知の情報の提供は、役務取引許可を要しない。"}, {"id": "第57回 問15", "q": "大量破壊兵器の仲介貿易取引規制は、ワッセナー・アレンジメントの合意に基づき実施されている。", "ans": "×", "exp": "誤り。ワッセナー・アレンジメントは「通常兵器・汎用品」の管理が目的である。大量破壊兵器関連は他の国際枠組みに対応する。"}, {"id": "第57回 問16", "q": "特別一般包括輸出・役務(使用に係るプログラム) 取引許可が適用できるリスト規制該当貨物であっても、包括許可取扱要領の別表3の (10) (表1)で規定する「核兵器等の開発等」に「用いられる(利用される)場合」は、すべての仕向地について当該包括許可は失効する。", "ans": "〇", "exp": "正しい。核兵器等の用途（客観要件）に該当する場合は、全仕向地で包括許可の適用が制限される。"}, {"id": "第57回 問17", "q": "本邦にある大学Xのフランス人留学生Aは、来日から7ヶ月を経過している居住者である。留学生Aは、物理の能力が極めて優秀なので、フランス政府から留学資金の全額の提供を受けている。この場合、留学生Aは、特定類型②にあたる。", "ans": "〇", "exp": "正しい。外国政府から多額の利益を得ている居住者の定義（特定類型②）に合致する。"}, {"id": "第57回 問18", "q": "本邦にあるポンプメーカーが、米国で行われる国際見本市に輸出令別表第1の3の項 (2) 9に該当するポンプを出品し、見本市終了後に本邦に持ち帰る場合は、本邦から輸出する際の輸出許可は不要である。", "ans": "×", "exp": "誤り。リスト規制品（3の項）を国外に持ち出す場合は、一時的な展示目的であっても輸出許可が必要である。"}, {"id": "第57回 問19", "q": "本邦にある貿易会社Xは、国内にあるメーカーYからポンプを購入し、米国のメーカーZに輸出する予定である。貿易会社Xの担当者は、メーカーYからポンプの該非判定書を入手したところ、「ポンプは輸出令別表第1の3の項(2) 9及び輸出令別表第1の16の項に該当する。」と記載されていたので、貿易会社Xの担当者は、「この該非判定書は誤っているので、見直して欲しい。」とメーカーYに連絡をした。貿易会社Xの担当者の対応は適切である。", "ans": "〇", "exp": "正しい。1〜15項に該当するものは16項には該当しないため、メーカーの判定誤りを指摘するのは適切である。"}, {"id": "第57回 問20", "q": "本邦の大学生Aは、自作した暗号通信プログラムa (外為令別表の9の項 (1)に該当)を開発し、来週、世界中の誰でも無償で利用できるように自分のホームページにアップロードする予定である。この場合、大学生Aは、役務取引許可申請は不要である。", "ans": "〇", "exp": "正しい。不特定多数が入手可能な状態にする行為（公知とするための提供）は、許可を要しない。"}, {"id": "第57回 問21", "q": "外為法等遵守事項では、子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うことを求めていない。", "ans": "×", "exp": "誤り。第53回問23と同様、関連会社等への適切な指導が求められている。"}, {"id": "第57回 問22", "q": "経済産業省令である「遵守基準省令」と通達の一部である「外為法等遵守事項」の規定を比較すると、「外為法等遵守事項」の方が、努力規定が多い。", "ans": "×", "exp": "誤り。「外為法等遵守事項（CP届出事項）」は実施すべき事項として規定されており、努力規定が多いわけではない。"}, {"id": "第57回 問23", "q": "日本人Aは居住者で、本邦法人Xの取締役であり、外国法人Yの取締役でもある。日本人Aは外国法人Yとの間で、善管注意義務が外国法人Yと本邦法人Xで競合する場合は、本邦法人Xを優先するとの契約を結んでいる。この場合、日本人Aは、特定類型①に該当しない。", "ans": "〇", "exp": "正しい。本邦法人の利益を優先する旨の合意（優先合意）がある場合は、特定類型①から除外される。"}, {"id": "第57回 問24", "q": "本邦にある貿易会社Xは、輸出令別表第1の3の項に関連する貨物を台湾のメーカーYから輸入し、オランダで販売する予定である。輸出令別表第1の3の項は、MTCRの規制であるから、同サイトにある英文の規制リストを参考に台湾のメーカーYに該非を確認するとよい。", "ans": "×", "exp": "誤り。3の項（化学武器関連）はオーストラリア・グループ（AG）の規制であり、MTCRではない。"}, {"id": "第57回 問25", "q": "本邦にある貿易会社Xは、2か月に一度の割合で、輸出令別表第1の16の項に該当する建築用工具のみを英国にあるメーカーYに輸出している。この場合、貿易会社Xは、遵守基準省令でいう「該非確認責任者」を選任する義務はない。", "ans": "×", "exp": "誤り。16項該当貨物のみであっても、業として輸出を行う者は「該非確認責任者」の選任が義務付けられる。"}, {"id": "第58回 問1", "q": "1974年におけるインドの核実験成功を背景に核兵器の製造等に使用される可能性のある製造設備等の輸出規制を行うことを目的として発足した国際輸出管理レジームは、MTCRである。下線部分は正しい。", "ans": "×", "exp": "誤り。インドの核実験を契機に発足したのは「原子力供給国グループ（NSG）」である。MTCRはミサイル関連。"}, {"id": "第58回 問2", "q": "輸出令別表第1の9の項で規制されている貨物の英訳をする場合は、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。9項（通信・暗号）はWAの規制に基づいている。"}, {"id": "第58回 問3", "q": "本邦にあるメーカーXは、ドイツにあるメーカーYからに外為令別表の9の項(1)に該当する暗号ソフトウエアを借りた。自社の工場で使用してみたが、性能が劣ることが判明したので、返却することになった。この場合、メーカーYに当該ソフトウエアを国際宅配便で返却する場合、もともとメーカーYのものであるから、役務取引許可は不要である。", "ans": "×", "exp": "誤り。元の所有者が誰であれ、リスト規制技術（プログラム等）を国外（ドイツ）に返送する行為は許可が必要である。"}, {"id": "第58回 問4", "q": "外為法第53条第1項では、「経済産業大臣は、第48条第1項の規定による許可を受けないで同項に規定する貨物の輸出をした者に対し、(A)以内の期間を限り、輸出を行い、又は特定技術を外国において提供し、若しくは非居住者に提供することを目的とする取引若しくは当該取引に関する特定記録媒体等の輸出若しくは外国において受信されることを目的として行う電気通信による特定技術を内容とする情報の送信を行うことを禁止することができる。」と規定している。(A)には、「3年」が入る。", "ans": "〇", "exp": "正しい。行政制裁の最長期間は3年である。"}, {"id": "第58回 問5", "q": "本邦にあるX大学は、オーストラリアにあるメーカーYと新素材開発の契約に基づき、X大学が所有する測定装置 a (輸出令別表第1の2の項 (12) 2に該当)をメーカーYに輸出する予定である。この場合、「基礎科学分野の研究活動」にあた得るので、X大学は輸出許可が不要である。", "ans": "×", "exp": "誤り。貨物の輸出には「基礎科学分野の研究活動」の特例は適用されない。"}, {"id": "第58回 問6", "q": "本邦にあるメーカーXは、米国にある子会社Yに、1つの契約で輸出令別表第1の6の項(1)に該当する軸受(価額90万円)と輸出令別表第1の7の項(1)に該当する集積回路(価額85万円)を来月、輸出する予定である。なお、いずれの貨物も告示貨物ではない。この場合、メーカーXは、少額特例が適用できるので、輸出許可申請は不要である。", "ans": "〇", "exp": "正しい。6の項・7の項（WA系）該当貨物で、いずれも総価額100万円以下の米国向け輸出は、少額特例が適用できる。"}, {"id": "第58回 問7", "q": "本邦にあるメーカーXは、韓国にある子会社Yに、取得している特別一般包括輸出・役務(使用に係るプログラム) 取引許可を適用して、輸出令別表第1の6の項(1)に該当する軸受(総価額200万円)を輸出した。この場合、輸出関連書類等は、輸出時から7年間保存する必要がある。下線部分は正しい。", "ans": "×", "exp": "誤り。包括許可の適用に関する書類の保存期間は、原則として5年間（またはCPの規定に従う）であるが、一律に「7年」が法律上の最短義務ではない。"}, {"id": "第58回 問8", "q": "本邦にあるX大学は、取得している特別一般包括輸出・役務(使用に係るプログラム)取引許可を使用して、同許可の適用可能な貨物を米国にあるY大学に輸出する予定である。Y大学の用途は、通常兵器の製造である場合、当該特別一般包括輸出・役務(使用に係るプログラム) 取引許可は失効する。", "ans": "×", "exp": "誤り。米国は「グループA」であるため、通常兵器用途であっても包括許可の適用は失効しない。"}, {"id": "第58回 問9", "q": "輸出令第5条第1項は、「税関は、(A)の指示に従い、貨物を輸出しようとする者が法第48条第1項の規定による許可若しくは第2条第1項の規定による承認を受けていること又は当該許可若しくは承認を受けることを要しないことを確認しなければならない。」と規定している。(A)には、「経済産業大臣」が入る。", "ans": "〇", "exp": "正しい。第56回問16と同様である。"}, {"id": "第58回 問10", "q": "初来日から1年経ったフランス人の留学生Xは、柔道の能力が優れていることから、フランス政府から留学費用の全額の支給を受けている。この場合、留学生Xは、特定類型②に該当しない。", "ans": "×", "exp": "誤り。外国政府から利益を得ている居住者であり、特定類型②に該当する。"}, {"id": "第58回 問11", "q": "本邦にあるメーカーXは、シンガポールにあるメーカーYから、輸出令別表第1の16の項に該当する炭素繊維2トン分の注文を受けた。用途を確認したところ、通常兵器である戦車の製造に使うとメールで連絡を受けた。この場合、通常兵器キャッチオール規制の用途要件に該当するので、メーカーXは輸出許可申請が必要である。", "ans": "×", "exp": "誤り。シンガポールは「別表第3の2（国連武器禁輸地域）」に含まれないため、許可不要である。"}, {"id": "第58回 問12", "q": "特別一般包括許可の申請先は、経済産業省安全保障貿易審査課である。", "ans": "×", "exp": "誤り。包括許可の申請窓口は各経済産業局等である。"}, {"id": "第58回 問13", "q": "特別一般包括許可の申請者は、輸出管理内部規程の整備及び外為法等遵守事項の確実な実施に関して、安全保障貿易検査官室から輸出管理內部規程受理票及びチェックリスト受理票の交付を受けている者であることが申請者の要件の1つである。", "ans": "〇", "exp": "正しい。包括許可取得の要件である。"}, {"id": "第58回 問14", "q": "一般包括輸出・役務(使用に係るプログラム) 取引許可証の有効期限は5年である。", "ans": "×", "exp": "誤り。包括許可の有効期限は通常3年である。"}, {"id": "第58回 問15", "q": "本邦にある貿易会社Xは、欧米を中心に毎日輸出を行っているが、輸出している製品は、全て輸出令別表第1の16の項に該当する貨物なので、外為法第55条の10第1項の輸出等を「業として行う者」にはあたらない。", "ans": "×", "exp": "誤り。第53回問25と同様、反復継続すれば「業として行う者」である。"}, {"id": "第58回 問16", "q": "東京にある貿易会社Xは、中国にあるメーカーYから、輸出令別表第1の16の項に該当する無機繊維を購入し、パキスタンにあるメーカーZに売却する予定である。当該無機繊維は、中国のメーカーYからパキスタンのメーカーZへ直接輸出される。貿易会社XにてメーカーZを調べたところ、外国ユーザーリスト掲載企業であることが判明したが、用途は家庭用エアコンの筐体製造であることが判明している。この場合、貿易会社Xは、外為法第25条第4項の仲介貿易取引許可の申請は不要である。", "ans": "〇", "exp": "正しい。16項該当貨物の仲介貿易において、懸念用途（大量破壊兵器等）がない場合は、パキスタン向けであっても許可不要である。"}, {"id": "第58回 問17", "q": "「核兵器の開発又は製造に用いられる工作機械」とは、「核兵器の開発又は製造に用いることができる工作機械」という意味である。", "ans": "〇", "exp": "正しい。仕様・精度を満たせば「用いられる」とみなされる（能力判定）。"}, {"id": "第58回 問18", "q": "本邦にあるメーカーXが、輸出令別表第1の16の項に該当するチタン合金を韓国にあるY大学に輸出する際、用途は「航続距離が300キロメートルを超える無人航空機の製造に使用する。」と連絡を受けた。この場合、メーカーXは、大量破壊兵器キャッチオール規制に基づく輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。韓国（グループA）宛であっても、インフォーム等特定の条件下、または大量破壊兵器用途が判明した場合には許可が必要となる。※問18の論理に基づく。"}, {"id": "第58回 問19", "q": "通常兵器キャッチオール規制は、ワッセナー・アレンジメントの合意に基づいて、実施されている。", "ans": "〇", "exp": "正しい。WAは通常兵器および関連汎用品のキャッチオール規制の根拠となっている。"}, {"id": "第58回 問20", "q": "外為法第55条の10第1項でいう「輸出者等遵守基準」は、外為法等遵守事項のことである。", "ans": "×", "exp": "誤り。遵守基準は法的基準、遵守事項は実務上の届出名称である（第56回問14と同様）。"}, {"id": "第58回 問21", "q": "本邦にあるメーカーXは、台湾の警察から、特別一般包括輸出・役務(使用に係るプログラム) 取引許可が適用できる輸出令別表第1の9の項 (7)に該当する暗号無線装置(総価額200万円)を受注した。用途は、山岳での遭難者の人命救助に用いられるものであることが判明している。この場合、メーカーXは、当該取引に先立ち経済産業大臣への「届出」は不要である。", "ans": "〇", "exp": "正しい。人命救助目的など治安維持・反政府活動監視等の懸念用途に該当しない場合は、届出不要で包括許可を適用できる。"}, {"id": "第58回 問22", "q": "本邦の大学院生Xは、輸出令別表第1の2の項に該当するロボット (価格1,000万円)を無許可で中国の軍事関連企業Yに輸出した。この違反に対して、懲役刑が科される場合、外為法第69条の6第2項第二号により、10年の懲役に処される。下線部分は正しい。", "ans": "〇", "exp": "正しい。リスト規制（原子力・武器関連等）の無許可輸出に対する個人への重い罰則に合致する。"}, {"id": "第58回 問23", "q": "遵守基準省令第1条第二号ハは、「該非確認に係る手続を定めること。」と規定されているので、当該規定は、努力規定である。下線部分は正しい。", "ans": "×", "exp": "誤り。「手続を定めること」は遵守事項としての法的義務であり、努力規定（努めること）ではない。"}, {"id": "第58回 問24", "q": "外為法第48条第1項の「輸出をしようとする者」は、およそ貨物の輸出を行おうとする者であり、居住者に限られており、非居住者は含まない。", "ans": "×", "exp": "誤り。輸出主体は居住者に限定されない。"}, {"id": "第58回 問25", "q": "本邦にあるメーカーXは、半年に一度の割合で、輸出令別表第1の16の項に該当する建築用の鋼材(総価額200万円)を米国にある子会社Yに輸出している。この場合、メーカーXは、遵守基準省令でいう「該非確認責任者」を選任する義務がある。", "ans": "〇", "exp": "正しい。反復継続して輸出を行う（業として行う）以上、該非確認責任者の選任は義務である。"}, {"id": "第59回 問1", "q": "技術の該非判定は、①外為令別表、②貨物等省令、③役務通達の用語の解釈を確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。技術判定のリソース定義として適切である。"}, {"id": "第59回 問2", "q": "輸出令別表第1の15の項で規制されている貨物の英訳をする場合は、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。15項はWA規制に基づいている。"}, {"id": "第59回 問3", "q": "本邦にある大学Xの大学院生である日本人Aは、中国にある法人Yと雇用契約を締結し、日本国内の量子暗号技術の情報収集に努めている。この場合、日本人Aは、日本人なので特定類型①に該当しない。", "ans": "×", "exp": "誤り。国籍に関わらず、外国法人と雇用契約下にある居住者は特定類型①に該当する。"}, {"id": "第59回 問4", "q": "外為法第48条第1項中の政令は、外国為替令で、外為法第25条第1項中の政令は、輸出貿易管理令のことである。", "ans": "×", "exp": "誤り。48条（貨物）は輸出令、25条（技術）は外為令である。逆の記述である。"}, {"id": "第59回 問5", "q": "来日から1年を経過した韓国人留学生Xは、ゲーム制作の才能があることから、米国にあるメーカーYから、留学費用の全額の提供を受けている。この場合、韓国人留学生Xは、特定類型②に該当する。", "ans": "×", "exp": "誤り。特定類型②は「外国政府等」からの利益が対象。民間企業（メーカーY）は該当しない。"}, {"id": "第59回 問6", "q": "輸出令別表第1の1の項の中欄に掲げる貨物とは、輸出令別表第1の1の項に該当する貨物という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第59回 問7", "q": "韓国にあるメーカーXは、本邦で行われる国際展示会に輸出令別表第1の3の項(2)2に該当する貯蔵容器(2セット)を出品し、終了後、韓国の自社に返送する予定である。メーカーXは、韓国に返送する際、輸出許可が必要である。", "ans": "×", "exp": "誤り。無償告示により、展示目的で一時輸入した貨物の返送は許可不要となる場合がある。"}, {"id": "第59回 問8", "q": "本邦にあるメーカーXの甲技術部長は、自己使用目的で、外為令別表の6の項に該当する開発中の設計図面を持ち出し、ニューヨークで最終チェックをする予定である。この場合、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。自己使用目的の携帯は「提供（取引）」に当たらないため許可不要。"}, {"id": "第59回 問9", "q": "メーカーXはシンガポールにあるメーカーYにビール製造用として輸出令別表第1の3の2の項(2)2に該当する発酵槽を輸出する予定である。ビール製造用と契約書等で明らかであれば、メーカーXは輸出許可不要である。", "ans": "×", "exp": "誤り。リスト規制品（3の2項等）は、用途が平和目的でも許可が必要である。"}, {"id": "第59回 問10", "q": "メーカーXの営業部長が、工作機械をリスト規制非該当と偽り、無許可で中国に輸出した。外為法72条第1項第二号により法人に対し罰金刑が科される場合、7億円以下となる。", "ans": "〇", "exp": "正しい。法人の罰金上限規定（7億円以下）に合致する。"}, {"id": "第59回 問11", "q": "英国のメーカーYにリスト規制該当の軸受を輸出する際、用途が戦車製造と判明した。メーカーXが取得している特別一般包括許可を適用して輸出する場合、経済産業大臣への「届出」が必要である。", "ans": "×", "exp": "誤り。通常兵器用途が判明した場合は包括許可が制限されるため、個別許可への切り替え等が必要。"}, {"id": "第59回 問12", "q": "メーカーXは来月、非居住者の外国人株主10名の工場見学を受け入れる予定である。工場見学ルートには外為令別表7の項該当の製造技術があるが、事前にネットで申し込めば見学可能である。この場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。不特定多数に公開されていないリスト規制技術を非居住者に提供・視察させる場合は、許可が必要である。"}, {"id": "第59回 問13", "q": "貿易会社Xが台湾メーカーYから16項該当貨物を購入し、ハンガリーのメーカーZに直接送らせる。Zが通常兵器のミサイル製造をすると連絡を受けていた場合、仲介貿易取引許可の申請が必要である。", "ans": "×", "exp": "誤り。ハンガリーは「グループA」かつ通常兵器キャッチオール対象外地域のため、仲介貿易許可は不要。"}, {"id": "第59回 問14", "q": "特別一般包括許可が失効した場合であっても、あらたに個別輸出許可を申請し、許可を受ければ輸出することができる。", "ans": "〇", "exp": "正しい。包括許可が不適用の場合は個別許可ルートとなる。"}, {"id": "第59回 問15", "q": "1つの契約でリスト規制該当貨物を何回かに分割して輸出する場合、その都度輸出許可を取らなければならない。", "ans": "×", "exp": "誤り。1つの許可証で複数回の分割輸出（分積）が可能。"}, {"id": "第59回 問16", "q": "外為法等遵守事項では、通関時の事故が発生した場合には、輸出管理部門に報告することとされている。", "ans": "〇", "exp": "正しい。CP届出事項に基づく社内報告体制の要件である。"}, {"id": "第59回 問17", "q": "貿易会社Xの甲営業課長は、貯蔵容器aがリスト規制該当であることを知らなかったので、許可なくタイに輸出した。この場合、貿易会社Xは外為法違反に問われることはない。", "ans": "×", "exp": "誤り。法令の不知（過失）は免責されず、外為法違反となる。"}, {"id": "第59回 問18", "q": "英国で工業所有権の出願等のために、出願に必要な最小限の技術を提供する際、外為令別表2の項該当技術が含まれていても役務取引許可は不要である。", "ans": "〇", "exp": "正しい。特例（工業所有権出願用の最小限技術）の適用により許可不要。"}, {"id": "第59回 問19", "q": "外為令別表9の項該当の暗号プログラムaの総価額が20万円であれば、少額特例が適用できるので、メーカーXは、役務取引許可は不要である。", "ans": "×", "exp": "誤り。少額特例は「貨物」のみであり、技術（役務）には適用されない。"}, {"id": "第59回 問20", "q": "扱う貨物が全て16項（キャッチオール規制対象）のみの場合、貿易会社Xは外為法第55条の10第1項の輸出等を「業として行う者」にあたらない。", "ans": "×", "exp": "誤り。16項のみでも反復継続すれば「業として行う者」である。"}, {"id": "第59回 問21", "q": "役務通達によれば、「検査」は、「製造」にあたる。", "ans": "〇", "exp": "正しい。製造の定義（役務通達）に検査等が含まれる。"}, {"id": "第59回 問22", "q": "イントラネット内に外為令別表9の項該当技術があり、これを海外子会社に開放する場合、サーバーが国内にあれば役務取引許可は不要である。", "ans": "×", "exp": "誤り。サーバーの場所は関係なく、国外からアクセス（受信）させる行為は許可対象。"}, {"id": "第59回 問23", "q": "外為法等遵守事項では、親会社は子会社に対し安全保障貿易管理に関する適切な指導を行うことを求めているが、関連会社に対しては求めていない。", "ans": "×", "exp": "誤り。関連会社に対しても適切な指導を行うよう規定されている。"}, {"id": "第59回 問24", "q": "キャッチオール規制に関する輸出許可申請は、輸出者の近くにある経済産業局に行うこととされている。", "ans": "×", "exp": "誤り。16項（キャッチオール）の許可申請先は経済産業省本省である。"}, {"id": "第59回 問25", "q": "輸出令別表第1の1の項該当貨物を、米国メーカーYから購入し、英国メーカーZに直接送る場合、本邦居住者が仲介するならば仲介貿易取引許可が必要である。", "ans": "〇", "exp": "正しい。1の項（武器）該当の外国間取引の仲介は許可が必要。"}, {"id": "第60回 問1", "q": "貨物の該非判定は、①輸出令別表第1、②貨物等省令、③運用通達の用語の解釈を確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。適切な該非判定プロセスの定義。"}, {"id": "第60回 問2", "q": "輸出令別表第1の3の2の項で規制されている貨物の英訳をする場合は、オーストラリア・グループのサイトが参考になる。", "ans": "〇", "exp": "正しい。3の2項はAGに対応。"}, {"id": "第60回 問3", "q": "ベトナム人留学生Aは来日から2年経過。中国メーカーYと雇用契約を結び、指示に従って国内の量子暗号技術の収集に従事している。この場合、Aは特定類型①に該当しない。", "ans": "×", "exp": "誤り。外国法人と雇用関係にある居住者は特定類型①に該当する。"}, {"id": "第60回 問4", "q": "外為法第48条第1項中の政令は、「輸出貿易管理令」で、外為法第25条第1項中の政令は、「外国為替令」である。", "ans": "〇", "exp": "正しい。"}, {"id": "第60回 問5", "q": "英国での国際展示会に3項該当の貯蔵容器を出品し、終了後に本邦に戻す予定である。この場合、展示目的の輸出なので許可は不要である。", "ans": "×", "exp": "誤り。リスト規制品の国外送出（展示含む）は原則として許可が必要。"}, {"id": "第60回 問6", "q": "運用通達によれば、輸出の時点とは、税関への輸出申告時と規定されている。", "ans": "×", "exp": "誤り。輸出の時点は船等の「離岸・離陸時」である。"}, {"id": "第60回 問7", "q": "X大学は3の2の項該当のウイルスを米国のY大学に輸出する。Y大学が抗がん剤の研究開発に用いるなら「基礎科学分野の研究活動」にあたるので許可不要である。", "ans": "×", "exp": "誤り。基礎科学分野の特例は技術のみであり、貨物（ウイルス）には適用されない。"}, {"id": "第60回 問8", "q": "輸出許可の申請者は、法人の場合、原則、代表権者（代表権を委任されたものを含む。）である。", "ans": "〇", "exp": "正しい。法人を代表する者が申請主体となる。"}, {"id": "第60回 問9", "q": "外為法第55条の10第1項では、輸出者等遵守基準を定めなければならないのは、輸出者と規定されている。", "ans": "×", "exp": "誤り。定めなければならないのは「大臣」であり、対象者は「業として行う者」である。"}, {"id": "第60回 問10", "q": "リスト規制非該当貨物の設計図面を提供する際、当該図面はリスト規制に該当することはないので、常に役務取引許可は不要である。", "ans": "×", "exp": "誤り。貨物が非該当でも、関連技術が外為令別表に該当する場合がある。"}, {"id": "第60回 問11", "q": "本日来日した中国メーカー部長Aは、ホテルから米国の社長宛に外為令別表7の項該当技術資料をメール送付する。この場合、Aは役務取引許可申請が必要である。", "ans": "〇", "exp": "正しい。国内から国外へのリスト規制技術送信は、非居住者が行っても許可が必要。"}, {"id": "第60回 問12", "q": "英国メーカーよりスマートフォンの部品用として、15項(2)該当の電波吸収材（総価額4万円）の注文を受けた。この場合、輸出許可は不要である。", "ans": "〇", "exp": "正しい。15項該当で5万円以下の英国向け（グループA）輸出は、少額特例が適用される。"}, {"id": "第60回 問13", "q": "包括許可において「核兵器等の開発等」に「用いられる場合」は、すべての仕向地について当該包括許可は失効する。", "ans": "〇", "exp": "正しい。核兵器等用途の客観要件懸念による全地域失効。"}, {"id": "第60回 問14", "q": "暗号プログラムa（9項該当）を誰でも無償で利用できるようにホームページにアップロードする場合、役務取引許可申請が必要である。", "ans": "×", "exp": "誤り。公知の情報（不特定多数への無償提供）は役務取引許可を要しない。"}, {"id": "第60回 問15", "q": "外為法等遵守事項では、通関時の事故が発生した場合、経済産業大臣に報告することと規定している。", "ans": "×", "exp": "誤り。社内報告（輸出管理部門への報告等）は求められるが、経産大臣への直接報告は一律規定ではない。"}, {"id": "第60回 問16", "q": "役務通達によれば、「分解修理」は、「使用」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第60回 問17", "q": "中国人留学生Aが2項該当の測定装置（200万円）を無許可で中国の友人に輸出した。第69条の6第2項第二号に基づき罰金刑が科される場合、3,000万円以下である。", "ans": "〇", "exp": "正しい。個人への罰則上限規定（3,000万円以下）に合致。"}, {"id": "第60回 問18", "q": "キャッチオール規制の許可の申請先は、経済産業省の安全保障貿易審査課である。", "ans": "〇", "exp": "正しい。"}, {"id": "第60回 問19", "q": "16項該当のマイコンを継続的に輸出するメーカーXは、遵守基準省令でいう「該非確認責任者」を選任する義務はない。", "ans": "×", "exp": "誤り。16項のみであっても業として輸出するなら該非確認責任者の選任は義務。"}, {"id": "第60回 問20", "q": "台湾の子会社に特別一般包括許可で6項該当品を輸出した。この場合、輸出関連書類等は輸出時から10年間保存する必要がある。", "ans": "×", "exp": "誤り。原則として5年間の保存が義務付けられる（10年ではない）。"}, {"id": "第60回 問21", "q": "フィリピンのメーカーYから16項該当炭素繊維を受注し、戦車（通常兵器）の製造に使うと連絡を受けた。この場合、用途要件に該当するので輸出許可が必要である。", "ans": "×", "exp": "誤り。フィリピンは「別表第3の2（武器禁輸）」に含まれない。"}, {"id": "第60回 問22", "q": "特別一般包括許可の申請者は、安全保障貿易検査官室から内部規程（CP）受理票及びチェックリスト受理票の交付を受けている必要がある。", "ans": "〇", "exp": "正しい。包括許可の取得条件である。"}, {"id": "第60回 問23", "q": "16項該当のチタン合金を中国に輸出する際、用途が「航続距離300km超の無人航空機の製造」と連絡を受けた。この場合、大量破壊兵器キャッチオールにより許可が必要である。", "ans": "〇", "exp": "正しい。300km以上の無人航空機はミサイル懸念用途。"}, {"id": "第60回 問24", "q": "来日から1年経ったカナダ人留学生Xは、カナダ政府から留学費用の全額支給を受けている。この場合、Xは特定類型②に該当しない。", "ans": "×", "exp": "誤り。外国政府（カナダ政府）から利益を得ており特定類型②に該当する。"}, {"id": "第60回 問25", "q": "沖縄にある在日米軍基地に3項該当のバルブを納品する場合、輸出許可申請不要である。", "ans": "〇", "exp": "正しい。国内納品扱いで許可不要。"}, {"id": "第61回 問1", "q": "中国から2項関連貨物を輸入し米国で販売する際、2項はMTCR規制なので、同サイトの英文リストを参考に中国メーカーに該非確認するとよい。", "ans": "×", "exp": "誤り。2項は原子力（NSG）であり、該非判定は日本の貨物等省令に基づき行うべきである。"}, {"id": "第61回 問2", "q": "駐日フランス大使館にリスト規制該当の暗号通信装置（総価額150万円）を納品する場合、輸出にあたるので、輸出許可が必要である。", "ans": "×", "exp": "誤り。国内の大使館への納品は「輸出（国外への送出）」に当たらない。"}, {"id": "第61回 問3", "q": "5年前に輸出したポンプが故障したため修理目的で輸入し、修理後に再輸出する。修理代等が30万円かかっても、メーカーXは輸出許可不要である。", "ans": "〇", "exp": "正しい。無償告示により修理後の再輸出は許可不要となる特例がある。"}, {"id": "第61回 問4", "q": "インドのメーカーから16項無機繊維を受注し、戦車製造に使うと連絡を受けた。この場合、通常兵器キャッチオール規制により許可が必要である。", "ans": "×", "exp": "誤り。インドは通常兵器キャッチオールの対象地域（別表3の2）ではない。"}, {"id": "第61回 問5", "q": "申請時の契約書には、原則として政府の許可が得られるまで契約が発効しない旨の規定を盛り込むことが運用通達等で求められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第61回 問6", "q": "米国メーカーYから1項該当の産業用銃を購入し、イスラエルに直接販売する（貨物は米国からイスラエルへ）。この場合、仲介貿易取引許可が必要である。", "ans": "〇", "exp": "正しい。1の項（武器）の仲介貿易は許可が必要。"}, {"id": "第61回 問7", "q": "台湾からの留学生Xは初来日から5ヶ月経過した。この場合、留学生Xは居住者として取り扱われる。", "ans": "×", "exp": "誤り。来日6ヶ月未満で勤務していない留学生は「非居住者」である。"}, {"id": "第61回 問8", "q": "外為法第1条の下線部「対外取引に対し必要最大限の管理又は調整を行う」は正しい。", "ans": "×", "exp": "誤り。正しくは「必要最小限」である。"}, {"id": "第61回 問9", "q": "役務通達の特定類型③とは、「本邦における行動に関し外国政府等の指示又は依頼を受ける者」と規定されている。", "ans": "〇", "exp": "正しい。定義通りである。"}, {"id": "第61回 問10", "q": "リスト規制該当の集積回路をエアコン用にアルゼンチンの子会社へ継続輸出する場合、一般包括輸出・役務取引許可を取得するとよい。", "ans": "〇", "exp": "正しい。グループA以外の特定国（アルゼンチン等）への特定規制品輸出には一般包括許可が有用である。"}, {"id": "第61回 問11", "q": "外為法等遵守事項では、該非判定に関して手続を明確にし、実施することが求められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第61回 問12", "q": "フランスから借りた9項該当プログラムを国際郵便で返却する場合、もともと相手の物なので役務取引許可は不要である。", "ans": "×", "exp": "誤り。リスト規制技術を国外へ出す以上、元の所有者を問わず許可が必要。"}, {"id": "第61回 問13", "q": "外為法第53条第1項の行政制裁として、輸出禁止等の期間は「5年」以内である。", "ans": "×", "exp": "誤り。正しくは「3年」以内。"}, {"id": "第61回 問14", "q": "米国子会社に3の2項該当の発酵槽（90万円）を輸出する際、少額特例が適用できるので許可不要である。", "ans": "×", "exp": "誤り。3の2項は少額特例の適用対象外。"}, {"id": "第61回 問15", "q": "外国ユーザーリスト掲載の中国企業（懸念：核）から16項該当品を受注。用途を尋ねるも「企業秘密」と拒まれた場合、大量破壊兵器キャッチオール許可が必要である。", "ans": "〇", "exp": "正しい。需要者の懸念と用途確認拒否の組み合わせは許可申請が必要な事案。"}, {"id": "第61回 問16", "q": "2項該当ソフトを提供したが、担当者が法規を知らなかった（不知）のであれば、外為法違反に問われない。", "ans": "×", "exp": "誤り。不知は免責されず、違反となる。"}, {"id": "第61回 問17", "q": "判定書に「ロボットaは輸出令別表第1の6項(7)及び16項に該当する」とある場合、下線部（16項該当）は誤っている。", "ans": "〇", "exp": "正しい。リスト規制（1〜15項）とキャッチオール規制（16項）は排他的である。"}, {"id": "第61回 問18", "q": "リスト規制該当貨物をフランス（グループA）へ輸出する際、戦車製造に用いられる場合は、特別一般包括許可は「失効」する。", "ans": "×", "exp": "誤り。グループA諸国（フランス等）宛の通常兵器用途は、包括許可の失効条項に当たらない。"}, {"id": "第61回 問19", "q": "貨物等省令の正式名称は「輸出貿易管理令別表第一及び外国為替令別表の規定に基づき貨物又は技術を定める省令」である。", "ans": "〇", "exp": "正しい。"}, {"id": "第61回 問20", "q": "2項(12)の「核兵器の開発等に用いられる」とは、「用いることができる」という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第61回 問21", "q": "特定類型①から③までに該当する者は、居住者で、かつ自然人に限られる。", "ans": "〇", "exp": "正しい。特定類型の対象は「居住者である自然人」である。"}, {"id": "第61回 問22", "q": "日本人Aは本邦法人Xと外国法人Yの取締役を兼任。Xを優先する契約がある場合、Aは特定類型①に該当する。", "ans": "×", "exp": "誤り。本邦法人の優先合意があるため、特定類型①から除外される。"}, {"id": "第61回 問23", "q": "内部規程（CP）の届出先は、近くの経済産業局である。", "ans": "×", "exp": "誤り。届出先は経済産業省本省の「安全保障貿易検査官室」である。"}, {"id": "第61回 問24", "q": "16項該当の建築資材を毎日米国に輸出する住宅メーカーXは、外為法上の輸出等を「業として行う者」にあたらない。", "ans": "×", "exp": "誤り。反復継続する以上「業として行う者」に該当する。"}, {"id": "第61回 問25", "q": "学会で9項該当技術を講演する際、誰でも参加可能（公知）であれば、外国人株主やリスト掲載者が聴講していても役務取引許可は不要である。", "ans": "〇", "exp": "正しい。公知の情報の提供は、聴講者の属性に関わらず許可不要。"}, {"id": "第62回 問1", "q": "技術の該非判定は、①外為令別表、②貨物等省令、③運用通達の用語の解釈を確認しながら行う必要がある。", "ans": "×", "exp": "誤り。技術判定では運用通達（貨物用）ではなく「役務通達」を参照する。"}, {"id": "第62回 問2", "q": "外為令別表の5の項（放射線検知技術等）の英訳をする場合、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。5項はWAに対応。"}, {"id": "第62回 問3", "q": "中国人留学生Aは来日から1年。中国メーカーYと雇用契約を結び、指揮命令に従って次世代暗号技術の収集に従事している。Aは特定類型①に該当する。", "ans": "〇", "exp": "正しい。外国法人と雇用関係にある居住者の定義に合致。"}, {"id": "第62回 問4", "q": "外為法第25条第1項中の「政令」も第25条第4項中の「政令」も「外国為替令」のことである。", "ans": "〇", "exp": "正しい。"}, {"id": "第62回 問5", "q": "大阪の国際展示会に3項該当の多重管を米国から出品し、終了後に米国に戻す際、輸出許可は不要である。", "ans": "〇", "exp": "正しい。無償告示により一時輸入した展示品の返送は許可不要となる。"}, {"id": "第62回 問6", "q": "役務通達によれば、「保守（点検）」は、「使用」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第62回 問7", "q": "英国子会社に7項該当の集積回路（150万円）を家庭用エアコン製造用に輸出する場合、安全保障上の問題はないので許可不要である。", "ans": "×", "exp": "誤り。リスト規制品（7項等）は民生用であっても許可が必要。"}, {"id": "第62回 問8", "q": "一般包括許可等の申請は、経済産業省の安全保障貿易審査課に行わなければならない。", "ans": "×", "exp": "誤り。申請先は各経済産業局等である。"}, {"id": "第62回 問9", "q": "16項該当の無機繊維を中国に輸出する際、用途が「300km以上の無人航空機の製造」と連絡を受けた。この場合、大量破壊兵器キャッチオール許可が必要である。", "ans": "〇", "exp": "正しい。300km以上の無人航空機はミサイル関連の懸念用途。"}, {"id": "第62回 問10", "q": "大学の教授が試作した9項該当暗号装置を通信学会（不特定多数参加）で紹介するため米国に持ち出し、後に持ち帰る場合、輸出許可は不要である。", "ans": "×", "exp": "誤り。貨物（装置）の国外持ち出しは、役務の特例（公知の技術）とは別に許可を要する。"}, {"id": "第62回 問11", "q": "英国子会社に特別一般包括許可で6項該当のロボットを輸出した。この場合、輸出関連書類等は輸出時から5年間保存する必要がある。", "ans": "〇", "exp": "正しい。包括許可適用時の標準的な書類保存期間に合致。"}, {"id": "第62回 問12", "q": "来日から1年経ったフランス人留学生Xは、フランス政府から留学費用の全額支給を受けている。この場合、Xは特定類型②に該当する。", "ans": "〇", "exp": "正しい。"}, {"id": "第62回 問13", "q": "16項該当の炭素繊維をベトナムに継続輸出するメーカーXは、遵守基準省令でいう「該非確認責任者」を選任する義務はない。", "ans": "×", "exp": "誤り。業として輸出を行う以上、選任は義務。"}, {"id": "第62回 問14", "q": "外為令別表等でいう「係る技術」とは、「必要な技術」という意味である。", "ans": "×", "exp": "誤り。「係る技術」は関係する技術全般であり、「必要な技術（不可欠なもの）」より広い。"}, {"id": "第62回 問15", "q": "リスト規制10項該当の光検出器a（90万円）をチリ（天体観測用）に輸出する際、告示貨物でなければ少額特例が適用できる。", "ans": "〇", "exp": "正しい。10項（WA系）該当で100万円以下のチリ向け輸出は、少額特例が適用できる。"}, {"id": "第62回 問16", "q": "誰でも見学できる工場見学コースで7項該当技術が視察される場合、米国の担当者が来日して視察しても、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。公知の技術提供に該当。"}, {"id": "第62回 問17", "q": "国内メーカーXが国際会議（海外）で国内の貿易会社Yに3項該当の製造技術図面を提供する場合、居住者同士なので許可は不要である。", "ans": "×", "exp": "誤り。居住者間であっても提供場所が国外（会議会場等）である場合は、許可が必要。"}, {"id": "第62回 問18", "q": "特別一般包括許可を適用して輸出する場合、用途や需要者の確認は不要である。", "ans": "×", "exp": "誤り。包括許可の適用においても用途・需要者の確認は必須。"}, {"id": "第62回 問19", "q": "個別の輸出許可の申請は、契約書がない場合、見積書でも可能である。", "ans": "×", "exp": "誤り。原則として契約書またはそれに準ずる確定書類が必要であり、見積書のみでは不可。"}, {"id": "第62回 問20", "q": "役務取引許可にも、貨物と同様、許可不要となる少額特例がある。", "ans": "×", "exp": "誤り。少額特例は貨物のみで役務にはない。"}, {"id": "第62回 問21", "q": "輸出令別表第1の6の項の中欄に掲げる貨物とは、輸出令別表第1の6の項に該当する貨物という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第62回 問22", "q": "来日1ヶ月の留学生（非居住者）と、来日6ヶ月以上の留学生（居住者）の判定基準は正しい。", "ans": "〇", "exp": "正しい。6ヶ月ルールの基本。"}, {"id": "第62回 問23", "q": "税関は、経産大臣の指示に従い、居住者が役務取引許可を受けているか確認しなければならない（輸出令5条1項）。", "ans": "×", "exp": "誤り。輸出令5条1項は「貨物」の確認規定である。"}, {"id": "第62回 問24", "q": "外為法等遵守事項では、「子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うように努めること。」と規定している。", "ans": "×", "exp": "誤り。「努めること（努力規定）」ではなく、遵守事項として明確に規定されている。"}, {"id": "第62回 問25", "q": "ロボット（1,000万円）を無許可で中国の軍事メーカーに輸出した際、科される懲役刑は「10年以下」である。", "ans": "×", "exp": "誤り。リスト規制の一般的な無許可輸出に対する懲役上限は「7年」である（10年は武器・原子力等の一部の重大罪）。"}, {"id": "第63回 問1", "q": "外為法48条1項中の(A)の許可には、経済産業省が入る。", "ans": "×", "exp": "誤り。正しくは「経済産業大臣」である。"}, {"id": "第63回 問2", "q": "輸出令別表第1の4の項（ミサイル関連）の貨物の英訳には、MTCR（ミサイル技術管理レジーム）のサイトが参考になる。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問3", "q": "米国子会社に2項該当のコンデンサをサンプルとして無償輸出する場合、安全保障上の問題はないので許可不要である。", "ans": "×", "exp": "誤り。リスト規制品は無償サンプルでも許可が必要。"}, {"id": "第63回 問4", "q": "輸出令等の用語には、運用通達の「解釈」により一般用語と異なる定義がある場合があり、該非判定時に留意が必要である。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問5", "q": "米国メーカーから受け取った8項該当図面を、契約に至らなかったため返却する場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。国外への返送も提供とみなされ許可が必要。"}, {"id": "第63回 問6", "q": "1項該当の軍用センサーを米国から購入しオーストラリアに直接送る（貨物が外国間移動）。これを国内会社が仲介する場合、仲介貿易取引許可が必要である。", "ans": "〇", "exp": "正しい。1の項該当品の仲介は許可が必要。"}, {"id": "第63回 問7", "q": "16項該当炭素繊維を台湾でストック販売（需要者未定）する場合、輸出許可申請が必要である。", "ans": "×", "exp": "誤り。キャッチオール規制（16項）は、懸念が判明しない限り需要者未定でも許可申請は不要。"}, {"id": "第63回 問8", "q": "シンガポールで工業所有権の出願等のため、必要な最小限の技術提供をする際、外為令別表9の項該当技術が含まれていても許可不要である。", "ans": "〇", "exp": "正しい。工業所有権出願の特例適用。"}, {"id": "第63回 問9", "q": "「核兵器の開発又は製造に用いられる工作機械」とは、「核兵器の開発又は製造に用いることができる工作機械」という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問10", "q": "告示貨物で10項該当の光検出器（6万円）をオーストラリアへ輸出する。この場合、少額特例により許可不要である。", "ans": "×", "exp": "誤り。告示貨物は少額特例の適用対象外。"}, {"id": "第63回 問11", "q": "台湾のメーカーから16項該当のチタン合金を受注し、短距離ミサイル製造に使用すると連絡を受けた。この場合、通常兵器キャッチオール許可申請が必要である。", "ans": "×", "exp": "誤り。台湾は通常兵器キャッチオールの対象地域（別表3の2）ではない。"}, {"id": "第63回 問12", "q": "役務取引許可申請に必要な書類は、運用通達に規定されている。", "ans": "×", "exp": "誤り。申請書類は「提出書類通達」等に規定されている。"}, {"id": "第63回 問13", "q": "外為法等遵守事項では、「該非判定に関して手続を明確にし、実施するよう努めること」と規定されている。", "ans": "×", "exp": "誤り。「努めること」ではなく、法的義務事項として規定されている。"}, {"id": "第63回 問14", "q": "日本の大学教授が米国の大学も兼任し、定期的に渡米。優先合意がない場合、当該教授は特定類型①に該当する。", "ans": "〇", "exp": "正しい。外国法人と雇用関係にある居住者の定義に合致。"}, {"id": "第63回 問15", "q": "輸出令別表第1の1から15までの項の下欄に掲げる地域は、「全地域」である。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問16", "q": "香港（懸念：ミサイル）の企業から16項該当品を大量受注し、用途確認を拒否された。この場合、大量破壊兵器キャッチオール許可申請が必要である。", "ans": "〇", "exp": "正しい。懸念需要者＋用途確認拒否の状況は許可申請が必要。"}, {"id": "第63回 問17", "q": "役務通達の「用語の解釈」によれば、「検査、試験」は、「製造」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問18", "q": "居住者がリスト規制該当技術について、非居住者に口頭で説明する場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。口頭による提供も許可が必要。"}, {"id": "第63回 問19", "q": "許可申請時の契約書には、政府の許可が得られるまで契約が発効しない旨の規定を盛り込むことが求められている（運用通達）。", "ans": "〇", "exp": "正しい。"}, {"id": "第63回 問20", "q": "外為令別表6の項該当技術が含まれている「公開特許情報のみ」を英国子会社に提供する場合、役務取引許可は不要である。", "ans": "〇", "exp": "正しい。公知情報の提供。"}, {"id": "第63回 問21", "q": "年間収益の25%以上を外国政府から得ている貿易会社Xは、特定類型②にあたる。", "ans": "×", "exp": "誤り。特定類型は自然人のみが対象。"}, {"id": "第63回 問22", "q": "駐日アルゼンチン大使館から注文を受け、国内で外為令別表9の項該当プログラムを納品する場合、役務取引許可が必要である。", "ans": "〇", "exp": "正しい。国内での非居住者（大使館員等）への提供として許可が必要。"}, {"id": "第63回 問23", "q": "リスト規制品を米国（グループA）へ輸出する際、戦車（通常兵器）製造に用いられる場合は、特別一般包括許可は「失効」する。", "ans": "×", "exp": "誤り。グループA宛の通常兵器用途は失効条項対象外。"}, {"id": "第63回 問24", "q": "3の2の項該当の細菌を、タイの大学へ「基礎科学分野の研究活動」のために輸出する場合、輸出許可は不要である。", "ans": "×", "exp": "誤り。貨物（細菌）には基礎科学特例は適用されない。"}, {"id": "第63回 問25", "q": "米国から輸入した11項該当貨物が故障していたため返品交換する。この場合、無償告示第一号1により返品時の輸出許可は不要である。", "ans": "×", "exp": "誤り。返品時の無償告示適用には厳格な条件（契約等）があり、一律に不要とはならない。"}, {"id": "第64回 問1", "q": "外為法等遵守事項では、「子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うよう努めること。」と規定している。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問2", "q": "外為法第48条第1項中の「政令」は2箇所あるが、前者は「輸出貿易管理令」で、後者は「外国為替令」である。", "ans": "×", "exp": "誤り。第48条第1項の政令はいずれも「輸出令」である。"}, {"id": "第64回 問3", "q": "貿易会社XがメーカーZの誤った判定書を信じて無許可輸出をした場合、外為法違反に問われるのは、実際に輸出を行った貿易会社Xである。", "ans": "〇", "exp": "正しい。輸出者の自己責任原則。"}, {"id": "第64回 問4", "q": "9項該当の暗号通信装置を「基礎科学分野の研究活動」の共同研究のためにNZに輸出する場合、輸出許可申請不要である。", "ans": "×", "exp": "誤り。貨物（装置）には基礎科学特例はない。"}, {"id": "第64回 問5", "q": "タイの子会社に3の2項該当の凍結乾燥機（90万円）をサンプル輸出する。この場合、少額特例は適用できないので許可が必要である。", "ans": "〇", "exp": "正しい。3の2項は少額特例除外項目。"}, {"id": "第64回 問6", "q": "16項該当の集積回路を定期的に子会社に輸出する場合、メーカーXは輸出等を「業として行う者」にあたらない。", "ans": "×", "exp": "誤り。反復継続するなら「業として行う者」である。"}, {"id": "第64回 問7", "q": "以前許可を得て輸出した測定装置（2項該当）が故障したため、交換品を無償で先に輸出し、後に故障品を輸入する。この場合、無償告示により許可不要である。", "ans": "×", "exp": "誤り。無償告示の適用順序（故障品輸入→交換品輸出）を満たさない。"}, {"id": "第64回 問8", "q": "横須賀にある米軍基地に3項該当の貯蔵容器を納品することは、外為法第48条第1項の「輸出」にあたらない。", "ans": "〇", "exp": "正しい。国内納品。"}, {"id": "第64回 問9", "q": "学会（参加費10ユーロ・不特定多数参加）で9項該当技術を講演する場合、イランや中国の軍事関連研究者が聴講していても許可申請は不要である。", "ans": "〇", "exp": "正しい。公知の提供。"}, {"id": "第64回 問10", "q": "ロボット設計図面（6項該当）をイタリアに「自己使用目的」で持ち出す場合、非居住者に提供しなくても役務取引許可が必要である。", "ans": "×", "exp": "誤り。自己使用目的の携帯は許可不要。"}, {"id": "第64回 問11", "q": "16項該当ロボットを中央アフリカ（別表3の2）へ輸出する際、マシンガン（通常兵器）の製造に使用すると連絡を受けた場合、許可申請が必要である。", "ans": "〇", "exp": "正しい。通常兵器キャッチオール対象地域＋用途判明。"}, {"id": "第64回 問12", "q": "特別一般包括許可で中国（グループA外）へ6項該当品を輸出する。軍艦の製造に使用すると事前に連絡を受けている場合、輸出後に報告が必要である。", "ans": "×", "exp": "誤り。軍事用途判明時は包括許可適用不可（事後報告では済まない）。"}, {"id": "第64回 問13", "q": "契約書には「政府の許可が得られるまで契約が発効しない」旨の規定を盛り込むことが運用通達等で求められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問14", "q": "2項（貨物・技術）は、原子力供給国グループ（NSG）の合意に基づく規制である。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問15", "q": "外国政府から運営資金の半分を得ているX大学は、特定類型②にあたる。", "ans": "×", "exp": "誤り。特定類型は自然人が対象。"}, {"id": "第64回 問16", "q": "新製品開発のため、特定類型①該当社員Aに外為令別表9の項該当技術資料を提供する場合、役務取引許可は不要である。", "ans": "×", "exp": "誤り。国内であっても特定類型該当者への提供は許可が必要。"}, {"id": "第64回 問17", "q": "チェコやポーランド（グループA）へ6項該当工作機械を輸出する場合、一般包括許可を取得するのが一番良い。", "ans": "〇", "exp": "正しい。グループA宛には包括許可が効率的である。"}, {"id": "第64回 問18", "q": "第53条第1項に基づき、無許可輸出者に対し「3年」以内の期間、輸出や技術提供を禁止できる。", "ans": "〇", "exp": "正しい。行政制裁期間。"}, {"id": "第64回 問19", "q": "貨物Xが1〜15項に該当しなければ、その設計・製造等の技術も1〜15項に該当することはない。", "ans": "×", "exp": "誤り。貨物と技術の該当性は個別。"}, {"id": "第64回 問20", "q": "香港（懸念：ミサイル）の企業から16項人造黒鉛の引き合い。用途を隠匿された場合、大量破壊兵器キャッチオール許可申請が必要である。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問21", "q": "特別一般包括許可で4項該当品をスイスに輸出した。この資料は内部規程（CP）に基づき「少なくとも7年間」保存する必要がある。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問22", "q": "キャッチオール規制に関する許可申請は、経済産業省の安全保障貿易審査課に行う必要がある。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問23", "q": "第48条第1項の「輸出をしようとする者」には、法人・自然人の双方が含まれる。", "ans": "〇", "exp": "正しい。"}, {"id": "第64回 問24", "q": "輸出令別表第1の1から15までの項の下欄に掲げる地域とは、全て「全地域（別表第3に掲げる地域を除く。）」である。", "ans": "×", "exp": "誤り。リスト規制（1〜15項）の下欄は「全地域」である。"}, {"id": "第64回 問25", "q": "インドの子会社から16項該当品を買い取り、香港に直接送らせる（外国間移動）。用途が電動自転車用と判明している場合、仲介貿易許可は不要である。", "ans": "〇", "exp": "正しい。大量破壊兵器懸念なしの16項仲介は許可不要。"}, {"id": "第65回 問1", "q": "ソフトウェアの該非判定は、①外為令別表、②貨物等省令、③役務通達の用語の解釈を確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問2", "q": "14項該当の潜水用具（80万円）をフィリピンへ輸出する。この場合、少額特例が適用できるので許可不要である。", "ans": "×", "exp": "誤り。14項の少額特例限度額は5万円である。"}, {"id": "第65回 問3", "q": "外為法第25条第1項も第48条第1項も「国際的な平和及び安全の維持」という語句で始まる。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問4", "q": "輸出令第5条第1項は、「税関は、財務大臣の指示に従い、…」と規定している。", "ans": "×", "exp": "誤り。指示権者は「経済産業大臣」である。"}, {"id": "第65回 問5", "q": "来日から1年経過したタイ人留学生Xは、メーカーYから留学費用の全額支給を受けている。Xは特定類型②に該当しない。", "ans": "〇", "exp": "正しい。民間企業からの利益は対象外。"}, {"id": "第65回 問6", "q": "輸出令別表第1の8の項の中欄に掲げる貨物とは、輸出令別表第1の8の項に該当する貨物という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問7", "q": "リスト規制該当技術の提供は「口頭」であれば規制していないので、ベルギー大使館での講演に役務取引許可は不要である。", "ans": "×", "exp": "誤り。提供手段は問わず許可が必要。"}, {"id": "第65回 問8", "q": "第25条第1項の最初の「政令」は「外為令」、後者は「輸出令」である。", "ans": "×", "exp": "誤り。25条の政令はいずれも「外為令」である。"}, {"id": "第65回 問9", "q": "インドネシアの子会社に3の2項該当の凍結乾燥機を1ヶ月間「貸し出す」場合、安全保障上の問題はないので輸出許可不要である。", "ans": "×", "exp": "誤り。リスト規制品の国外持ち出しは貸出し等も許可が必要。"}, {"id": "第65回 問10", "q": "2項工作機械をリスト規制非該当と偽り、無許可輸出。法人に罰金が科される場合「10億円」以下となる。", "ans": "〇", "exp": "正しい。法人の高額罰金規定。"}, {"id": "第65回 問11", "q": "ハンガリー（グループA）へ7項集積回路を輸出した。戦車製造用と判明しており、一般包括許可を適用して輸出する場合、事後の「報告」が必要である。", "ans": "〇", "exp": "正しい。通常兵器用途報告義務（グループA向け）。"}, {"id": "第65回 問12", "q": "ウイルスは、外為法でいう「貨物」にあたらない。", "ans": "×", "exp": "誤り。細菌・ウイルス等も輸出令別表に規定される「貨物」である。"}, {"id": "第65回 問13", "q": "中国メーカーから16項該当品を買い、パキスタンのリスト掲載企業Zに直接送らせる。Zが民生用に使用すると連絡していても仲介貿易許可が必要である。", "ans": "×", "exp": "誤り。パキスタンは通常兵器キャッチオール対象外＋民生用途のため許可不要。"}, {"id": "第65回 問14", "q": "シンガポールメーカーから16項ニッケル合金を受注し、短距離ミサイル製造に使うと連絡を受けた。この場合、通常兵器キャッチオールにより許可が必要である。", "ans": "×", "exp": "誤り。シンガポールは通常兵器キャッチオール対象地域ではない。"}, {"id": "第65回 問15", "q": "7項集積回路Pが、香港の電気街で入手可能な場合、安全保障上の問題はないので輸出許可は不要である。", "ans": "×", "exp": "誤り。市販品であっても仕様を満たせば許可が必要。"}, {"id": "第65回 問16", "q": "担当者が、貨物がリスト規制該当であることを知らずに輸出した場合、外為法違反に問われることはない。", "ans": "×", "exp": "誤り。不知は免責されず。"}, {"id": "第65回 問17", "q": "外為令別表5の項に関連する技術の英訳には、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問18", "q": "外国ユーザーリスト掲載企業から娯楽用サッカーゲームのソフトウェアを受注した。この場合、大量破壊兵器キャッチオール許可は不要である。", "ans": "〇", "exp": "正しい。食品・娯楽用等の除外規定。"}, {"id": "第65回 問19", "q": "インドネシアで16項該当電動自転車の「在庫販売（需要者未定）」をする場合、輸出許可申請が必要である。", "ans": "×", "exp": "誤り。懸念がない16項輸出は需要者未定でも許可申請不要。"}, {"id": "第65回 問20", "q": "役務通達によれば、「修理」は、「使用」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問21", "q": "特別一般包括許可でギリシャ（グループA）の子会社に輸出する場合、用途や需要者の確認は不要である。", "ans": "×", "exp": "誤り。包括許可の適用においても用途・需要者確認は必須。"}, {"id": "第65回 問22", "q": "英国へ特別一般包括許可で6項NC工作機械を輸出した。資料を「少なくとも5年間」保存しなければならない。", "ans": "〇", "exp": "正しい。"}, {"id": "第65回 問23", "q": "外為法等遵守事項では、「子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うよう努めること。」と規定している。", "ans": "×", "exp": "誤り。「努めること」ではなく明確に求められている。"}, {"id": "第65回 問24", "q": "タイ向け輸出で通常兵器製造の疑いがあったため経産省へ届け、2日後に異議なしの連絡があった場合、特別一般包括許可を適用できる。", "ans": "〇", "exp": "正しい。インフォーム手続による包括許可適用。"}, {"id": "第65回 問25", "q": "経済産業大臣は、第53条第1項に基づき、違反者に対し行政制裁を科すことができる。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問1", "q": "MTCRの規制内容は、輸出令別表第1の2の項及び外為令別表の2の項に反映されている。", "ans": "×", "exp": "誤り。MTCR（ミサイル）は主として「4の項」である。"}, {"id": "第66回 問2", "q": "昨日来日した米国人Z（非居住者）が、国内で9項該当の暗号通信ソフトを購入し米国へ帰国する。この場合、少額特例を適用でき役務許可は不要である。", "ans": "×", "exp": "誤り。役務（技術）に少額特例はない。"}, {"id": "第66回 問3", "q": "輸出令別表第1の1から16までの項の下欄は、「全地域」と規定されている。", "ans": "×", "exp": "誤り。16項の下欄は「別表第3（グループA）を除く地域」である。"}, {"id": "第66回 問4", "q": "外為法第1条の下線部「必要最小限の管理又は調整を行う」は正しい。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問5", "q": "特定類型②の（A）に入るのは「50%超」である。", "ans": "×", "exp": "誤り。特定類型②の基準は「25%以上」である。"}, {"id": "第66回 問6", "q": "7項該当しない貨物の設計・製造等技術は、外為令別表7の項に該当することはない。", "ans": "×", "exp": "誤り。貨物と技術は別々に判定。"}, {"id": "第66回 問7", "q": "ポンプの設計図面を外国に提供する際、該非判定は①輸出令別表第1、②貨物等省令、③運用通達を確認しながら行う。", "ans": "×", "exp": "誤り。技術（図面）の判定には「外為令」および「役務通達」を参照する。"}, {"id": "第66回 問8", "q": "就職のため来日し国内研究所に勤務する外国人は、初来日から6ヶ月未満でも居住者として取り扱われる。", "ans": "〇", "exp": "正しい。本邦事務所勤務者は即時居住者。"}, {"id": "第66回 問9", "q": "米国から輸入した3項該当の焼却装置に故障があったため今週末に返品する。この場合、無償告示により許可不要である。", "ans": "×", "exp": "誤り。リスト規制品返品の一律許可不要規定はない。"}, {"id": "第66回 問10", "q": "運用通達によれば、輸出許可申請時に取引内容確認書類として「注文書」も認められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問11", "q": "外為令別表2の項の「経済産業省令」とは、「貿易関係貿易外取引等に関する省令」のことである。", "ans": "×", "exp": "誤り。正しくは「貨物等省令」である。"}, {"id": "第66回 問12", "q": "役務通達の「用語の解釈」によれば、「据付」は、「使用」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問13", "q": "オランダの国際展示会に2項該当のロボットを出品し、後に持ち帰る予定である。この際、輸出許可は不要である。", "ans": "×", "exp": "誤り。2項品の国外送出は許可が必要。"}, {"id": "第66回 問14", "q": "外為法第55条の10第1項によれば、輸出等を業として行う者は、「輸出者等遵守基準」を定めなければならない。", "ans": "×", "exp": "誤り。基準を定めるのは「大臣」であり、業として行う者はそれを「遵守」する。"}, {"id": "第66回 問15", "q": "特別一般包括許可で6項ロボットを台湾に輸出する。機関銃（通常兵器）製造用と判明している場合でも、包括許可を適用して輸出できる。", "ans": "×", "exp": "誤り。通常兵器用途判明時は包括不可。"}, {"id": "第66回 問16", "q": "2項(12)の「核兵器の開発等に用いられる」とは、「用いることができる」という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問17", "q": "7項該当集積回路が中国で普通に購入できる場合、輸出許可を取得する必要はない。", "ans": "×", "exp": "誤り。市販品でもリスト規制該当なら許可が必要。"}, {"id": "第66回 問18", "q": "フィリピンの警察から9項暗号通信装置を受注。反政府活動監視用と判明しており、特別一般包括許可を適用する場合、事前に「届出」が必要である。", "ans": "〇", "exp": "正しい。治安維持・反政府活動監視等の懸念用途インフォーム事案。"}, {"id": "第66回 問19", "q": "1項該当の産業用銃をオーストラリアから購入し米国に直接販売する（外国間移動）。これを本邦居住者が仲介する場合、仲介貿易取引許可が必要である。", "ans": "〇", "exp": "正しい。1の項仲介。"}, {"id": "第66回 問20", "q": "核兵器等の開発等に用いられる「疑いがある場合」、一般包括許可は失効する。", "ans": "×", "exp": "誤り。失効・制限されるのは「知った（判明した）」時である（疑いのみではない）。"}, {"id": "第66回 問21", "q": "外為令別表中の「係る技術」とは、「関係する技術」又は「関連する技術」という意味である。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問22", "q": "インド陸軍研究所から16項炭素繊維を受注。気象観測用の無人航空機（300km超）に使用すると連絡があった。この場合、大量破壊兵器キャッチオール許可は不要である。", "ans": "×", "exp": "誤り。300km以上の無人航空機用途はミサイル懸念。"}, {"id": "第66回 問23", "q": "2項(12)2測定装置と6項(6)測定装置の無許可輸出では、後者の方が刑罰が重い。", "ans": "×", "exp": "誤り。2項（原子力）の方が刑罰が重い設定である。"}, {"id": "第66回 問24", "q": "外為法等遵守事項では、「子会社及び関連会社に対し、安全保障貿易管理に関する適切な指導を行うこと。」が求められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第66回 問25", "q": "9項該当ソフトを非居住者に無許可で提供した場合、第53条第1項の行政制裁を受けることがある。", "ans": "×", "exp": "誤り。第53条第1項は「貨物」対象。技術提供違反の制裁は第25条の2等に基づく。"}, {"id": "第67回 問1", "q": "核兵器関連の国際輸出管理レジームとして発足したのは、オーストラリア・グループ（AG）である。", "ans": "×", "exp": "誤り。正しくはNSGである。AGは生物・化学。"}, {"id": "第67回 問2", "q": "輸出令別表第1の2の項の「経済産業省令」とは、「輸出貿易管理令の運用について」のことである。", "ans": "×", "exp": "誤り。貨物等省令のことである。"}, {"id": "第67回 問3", "q": "オーストラリア子会社に技術課長を派遣し、9項該当技術の提供を行う。この場合、役務取引許可が必要である。", "ans": "〇", "exp": "正しい。国外でのリスト規制技術提供。"}, {"id": "第67回 問4", "q": "外為令別表5〜15の項の技術の英訳には、ワッセナー・アレンジメント（WA）のサイトが参考になる。", "ans": "〇", "exp": "正しい。"}, {"id": "第67回 問5", "q": "ハンガリー警察から特別一般包括許可適用の9項暗号通信装置を受注。反政府活動用に用いられる場合、事前に大臣への「届出」が必要である。", "ans": "×", "exp": "誤り。ハンガリーはグループAであり、通常兵器系インフォーム対象外。"}, {"id": "第67回 問6", "q": "インドから16項(1)該当貨物を受注し、戦車製造に使うと連絡を受けた。通常兵器キャッチオールにより輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。問の前提事実に従い、許可申請が必要な論理を肯定。"}, {"id": "第67回 問7", "q": "中国から16項(2)該当品を受注し、大陸間弾道ミサイル（大量破壊兵器）製造に使用すると電話連絡があった。この場合、許可申請が必要である。", "ans": "〇", "exp": "正しい。大量破壊兵器用途判明。"}, {"id": "第67回 問8", "q": "米国人Sは初来日で10/1からホテルに勤務。初来日から6ヶ月経過していないので、「非居住者」である。", "ans": "×", "exp": "誤り。国内事務所勤務開始により即時居住者。"}, {"id": "第67回 問9", "q": "中国へ15項(2)電波吸収材（5万9千円）を輸出する際、少額特例は適用できない。", "ans": "〇", "exp": "正しい。15項の少額特例限度額5万円を超過。"}, {"id": "第67回 問10", "q": "「遵守基準省令」には、努力規定がない。", "ans": "×", "exp": "誤り。関連会社への指導等に「努めるものとする」規定がある。"}, {"id": "第67回 問11", "q": "韓国人Pは居住者で本邦法人Xの代表取締役。Xを優先する契約がある場合、Pは特定類型①に該当しない。", "ans": "〇", "exp": "正しい。優先合意による特定類型①除外。"}, {"id": "第67回 問12", "q": "16項該当品のみを継続輸出する貿易会社Xは、遵守基準省令でいう「該非確認責任者」を選任する義務がある。", "ans": "〇", "exp": "正しい。"}, {"id": "第67回 問13", "q": "運用通達等では、許可申請時の契約書に「許可が得られるまで契約が発効しない」旨の規定を盛り込むことを求めていない。", "ans": "×", "exp": "誤り。盛り込むことが求められている。"}, {"id": "第67回 問14", "q": "インドネシア（グループA外）へ戦車製造用としてリスト規制品を輸出する場合、特別一般包括許可は「失効」する。", "ans": "〇", "exp": "正しい。グループA外向けの通常兵器用途判明による失効。"}, {"id": "第67回 問15", "q": "2項(12)の工作機械は「専用」のものという意味なので、汎用機であれば該非判定は不要である。", "ans": "×", "exp": "誤り。用途ではなく精度等のスペックで判定。"}, {"id": "第67回 問16", "q": "内部規程（CP）の届出先は、近くの経済産業局である。", "ans": "×", "exp": "誤り。経産省本省（安全保障貿易検査官室）。"}, {"id": "第67回 問17", "q": "学会（参加費10ユーロ・公知）で暗号技術を講演する際、リスト掲載者が聴講していても講演前に役務取引許可を取得する必要がある。", "ans": "×", "exp": "誤り。公知情報の提供。"}, {"id": "第67回 問18", "q": "米国で1ドルショップを経営し、毎日16項該当品を輸出する貿易会社Xは、輸出等を「業として行う者」にあたる。", "ans": "〇", "exp": "正しい。"}, {"id": "第67回 問19", "q": "来日から7ヶ月経過した留学生Aは、中国メーカーと雇用契約を結びAI技術の収集に従事。この場合、Aは特定類型①に該当する。", "ans": "〇", "exp": "正しい。"}, {"id": "第67回 問20", "q": "第25条第1項中の2つの「政令」はいずれも「輸出令」のことである。", "ans": "×", "exp": "誤り。25条の政令は「外為令」。"}, {"id": "第67回 問21", "q": "役務通達によれば、「修理」は、「製造」にあたる。", "ans": "×", "exp": "誤り。修理は「使用」に分類される。"}, {"id": "第67回 問22", "q": "特許庁の公開特許情報にリスト規制技術が含まれていても、これを送付する際に事前に役務取引許可を取得する必要がある。", "ans": "×", "exp": "誤り。公知情報の送付。"}, {"id": "第67回 問23", "q": "以前輸出した2項該当測定装置が落雷で故障したため、交換品を先に輸出し、故障品を後に輸入する。この場合、無償告示により許可不要である。", "ans": "×", "exp": "誤り。無償告示の適用順序を満たさず。"}, {"id": "第67回 問24", "q": "グループA向けに16項該当品を輸出する際、経産大臣から許可申請の通知（インフォーム）を受けた場合でも、許可申請は不要である。", "ans": "×", "exp": "誤り。インフォーム通知は地域区分に優先し許可が必要となる。"}, {"id": "第67回 問25", "q": "新薬開発の契約に基づき、2項該当測定装置をオランダメーカーに貸し出すために輸出する。これは「基礎科学分野の研究活動」にあたるので許可不要である。", "ans": "×", "exp": "誤り。貨物輸出には基礎科学特例なし。"}, {"id": "第68回 問1", "q": "外為令別表8の項（レーザー関連等）の技術の英訳には、ワッセナー・アレンジメントのサイトが参考になる。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問2", "q": "外為法第25条第1項中の2つの「政令」は、いずれも「外国為替令」のことである。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問3", "q": "貨物の該非判定は、①輸出令別表第1、②貨物等省令、③運用通達の用語の解釈を相互に確認しながら行う必要がある。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問4", "q": "「修理」は、役務通達では、「製造」に含まれる。", "ans": "×", "exp": "誤り。「使用」に含まれる。"}, {"id": "第68回 問5", "q": "グループA国向けの輸出で、16項該当貨物について大臣から許可申請の通知を受けたときは、輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。インフォームの絶対性。"}, {"id": "第68回 問6", "q": "インドへ15項(2)該当の電波吸収材（総価額4万円）を輸出する場合、少額特例が適用できる。", "ans": "〇", "exp": "正しい。15項該当で5万円以下の非グループA向け（5号）は特例適用。"}, {"id": "第68回 問7", "q": "リスト規制技術を口頭で非居住者に提供する場合は許可不要だが、16項技術を口頭で提供する場合は必要である。", "ans": "×", "exp": "誤り。1〜15項（リスト規制）こそ口頭でも許可が必要。"}, {"id": "第68回 問8", "q": "役務取引許可申請に必要な書類は、運用通達に規定されている。", "ans": "×", "exp": "誤り。提出書類通達等に規定。"}, {"id": "第68回 問9", "q": "オランダのメーカーから購入した2項該当NC工作機械が故障し返送する。この場合、無償告示により輸出許可は不要である。", "ans": "×", "exp": "誤り。リスト規制品返品の無条件免除はない。"}, {"id": "第68回 問10", "q": "輸出令別表第1の1から15までの項の下欄に掲げる地域は、「全地域」である。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問11", "q": "運用通達では、契約書に「政府の許可が得られるまで契約が発効しない」旨の規定を盛り込むことが求められている。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問12", "q": "特別一般包括許可の申請先は、経済産業省安全保障貿易審査課である。", "ans": "×", "exp": "誤り。申請先は各経産局等。"}, {"id": "第68回 問13", "q": "全て16項該当貨物のみを扱う貿易会社Xは、外為法第55条の10第1項の輸出等を「業として行う者」にあたらない。", "ans": "×", "exp": "誤り。反復継続すれば該当。"}, {"id": "第68回 問14", "q": "「輸出者等遵守基準」は、外為法等遵守事項のことである。", "ans": "×", "exp": "誤り。法的基準と事務的呼称の違い。"}, {"id": "第68回 問15", "q": "2項(15)1該当ロボット（700万円）を無許可でインドの軍事企業に輸出した。第69条の6第2項第二号により「10年以下の拘禁刑」に処される。", "ans": "〇", "exp": "正しい。原子力・武器関連等、重大違反への罰則。"}, {"id": "第68回 問16", "q": "第25条第1項も第48条第1項も「国際的な平和及び安全の維持」で始まる。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問17", "q": "来日から7ヶ月経過し、メーカーFから留学費用の全額支給を受けている留学生Xは、特定類型②に該当する。", "ans": "×", "exp": "誤り。民間企業利益のため対象外。"}, {"id": "第68回 問18", "q": "運用通達における輸出の時点とは、税関への輸出申告の時をいう。", "ans": "×", "exp": "誤り。離岸・離陸時。"}, {"id": "第68回 問19", "q": "16項該当品をイラン（懸念国）へ直接送らせる外国間移動。大陸間弾道ミサイル製造用途と判明している場合、仲介貿易許可が必要である。", "ans": "〇", "exp": "正しい。大量破壊兵器用途判明時の仲介許可。"}, {"id": "第68回 問20", "q": "一般包括許可は、別表3の2（国連武器禁輸国）や別表4（イラン等）向けには適用できない。", "ans": "〇", "exp": "正しい。懸念地域への制限。"}, {"id": "第68回 問21", "q": "9項暗号ソフトを無償提供する場合、「取引」にあたらないので許可不要である。", "ans": "×", "exp": "誤り。無償提供も外為法上の「取引」に含まれる。"}, {"id": "第68回 問22", "q": "1つの契約で、3ヶ月おきに7項該当集積回路を輸出する場合、輸出許可申請は輸出毎に行う必要がある。", "ans": "×", "exp": "誤り。1つの許可証で分割輸出（分積）可能。"}, {"id": "第68回 問23", "q": "外為法等遵守事項では、「通関時の事故が発生した場合には、輸出管理部門に報告すること。」と規定されている。", "ans": "〇", "exp": "正しい。"}, {"id": "第68回 問24", "q": "タイへ16項該当貨物を輸出する際、通常兵器キャッチオール規制の用途要件にあたることが判明した。この場合、輸出許可申請が必要である。", "ans": "〇", "exp": "正しい。問の論理に従い必要と判断。"}, {"id": "第68回 問25", "q": "ベトナム向け輸出で通常兵器製造の疑いがあり大臣へ届けた。異議なしの連絡があった場合、特別一般包括許可を適用できる。", "ans": "〇", "exp": "正しい。"}];

var quiz = [], current = 0, answers = [], answered = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startQuiz() {
  quiz = shuffle(ALL_QUESTIONS).slice(0, 25);
  current = 0; answers = []; answered = false;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('final-screen').className = '';
  document.getElementById('quiz-screen').classList.add('active');
  showQuestion();
}

function showQuestion() {
  answered = false;
  var q = quiz[current];
  document.getElementById('prog-bar').style.width = ((current / 25) * 100) + '%';
  document.getElementById('prog-text').textContent = (current + 1) + ' / 25';
  document.getElementById('q-source').textContent = q.id;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('btn-maru').className = 'ans-btn btn-maru';
  document.getElementById('btn-batsu').className = 'ans-btn btn-batsu';
  document.getElementById('btn-maru').disabled = false;
  document.getElementById('btn-batsu').disabled = false;
  var ra = document.getElementById('result-area');
  ra.classList.remove('show');
  document.getElementById('next-btn').textContent = current === 24 ? '結果を見る' : '次の問題へ →';
  // PC: scroll to top of quiz; mobile: scroll q-card to top
  var qc = document.querySelector('.q-card');
  if (qc) qc.scrollTop = 0;
}

function answer(idx) {
  if (answered) return;
  answered = true;
  var q = quiz[current];
  var MARU = '\u3007';
  var BATSU = '\u00D7';
  var choice = idx === 0 ? MARU : BATSU;
  var correct = (choice === q.ans);
  document.getElementById('btn-maru').disabled = true;
  document.getElementById('btn-batsu').disabled = true;
  if (idx === 0) document.getElementById('btn-maru').className = 'ans-btn btn-maru selected';
  else document.getElementById('btn-batsu').className = 'ans-btn btn-batsu selected';
  answers.push({ q: q, choice: choice, correct: correct });
  var box = document.getElementById('result-box');
  var ansRow = '<div class="feedback-ans-row">あなたの回答：<span>' + choice + '</span>　正解：<span>' + q.ans + '</span></div>';
  if (correct) {
    box.innerHTML = '<div class="feedback-correct"><div class="feedback-label lbl-correct">✓ 正解！</div>' + ansRow + '<div class="feedback-exp">' + esc(q.exp) + '</div></div>';
  } else {
    box.innerHTML = '<div class="feedback-wrong"><div class="feedback-label lbl-wrong">✗ 不正解</div>' + ansRow + '<div class="feedback-exp">' + esc(q.exp) + '</div></div>';
  }
  document.getElementById('result-area').classList.add('show');
}

function nextQuestion() {
  if (!answered) return;
  // モバイル: シートを閉じてから次へ
  var ra = document.getElementById('result-area');
  var isMobile = window.innerWidth < 640;
  if (isMobile) {
    ra.classList.remove('show');
    setTimeout(function() {
      current++;
      if (current >= 25) showFinal();
      else showQuestion();
    }, 320);
  } else {
    ra.classList.remove('show');
    current++;
    if (current >= 25) showFinal();
    else showQuestion();
  }
}

function showFinal() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-area').classList.remove('show');
  document.getElementById('final-screen').className = 'show';
  var correctCount = 0;
  for (var i = 0; i < answers.length; i++) { if (answers[i].correct) correctCount++; }
  var pct = Math.round((correctCount / 25) * 100);
  document.getElementById('final-score').textContent = correctCount;
  document.getElementById('score-pct').textContent = pct + '%';
  setTimeout(function() { document.getElementById('score-bar').style.width = pct + '%'; }, 150);

  var list = document.getElementById('result-list');
  list.innerHTML = '';
  for (var i = 0; i < answers.length; i++) {
    var a = answers[i];
    var div = document.createElement('div');
    div.className = 'result-item ' + (a.correct ? 'correct' : 'wrong');
    div.innerHTML =
      '<div class="result-item-header">' +
        '<span class="result-source">' + esc(a.q.id) + '</span>' +
        (a.correct ? '<span class="result-badge-correct">正解</span>' : '<span class="result-badge-wrong">不正解</span>') +
      '</div>' +
      '<div class="result-q">' + esc(a.q.q) + '</div>' +
      '<div class="result-ans-row">あなたの回答：<span>' + a.choice + '</span>　正解：<span>' + a.q.ans + '</span></div>' +
      '<div class="result-exp">' + esc(a.q.exp) + '</div>';
    list.appendChild(div);
  }
  window.scrollTo(0, 0);
}

function restartQuiz() {
  document.getElementById('final-screen').className = '';
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('start-screen').style.display = 'block';
  window.scrollTo(0, 0);
}

document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('btn-maru').addEventListener('click', function() { answer(0); });
document.getElementById('btn-batsu').addEventListener('click', function() { answer(1); });
document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('restart-btn').addEventListener('click', restartQuiz);
document.getElementById('restart-btn-top').addEventListener('click', restartQuiz);
</script>
</body>
</html>
